<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | محجوب أونلاين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p-color: #4B0082; --g-color: #D4AF37; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #4B0082 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .logo-icon { font-size: 3rem; color: var(--g-color); margin-bottom: 10px; }
        .form-control {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 10px; padding: 12px; margin-bottom: 20px;
        }
        .btn-login {
            background: var(--g-color); color: #1a1a2e; width: 100%;
            padding: 12px; border-radius: 10px; font-weight: bold; border: none;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <i class="fas fa-shield-halved logo-icon"></i>
        <h2 class="text-white">محجوب أونلاين</h2>
        <p class="text-white-50 mb-4">سوقك الذكي - بوابة الإدارة</p>
        <form action="/admin/login" method="POST">
            <input type="text" name="username" class="form-control" placeholder="اسم المستخدم" required>
            <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-login">دخول النظام</button>
        </form>
    </div>
</body>
</html>
