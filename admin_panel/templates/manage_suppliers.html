{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4" style="direction: rtl; text-align: right; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <div class="row mb-4 animate__animated animate__fadeIn">
        <div class="col-12 text-center">
            <div class="d-inline-block p-3 rounded-circle bg-white shadow-sm mb-3">
                <i class="fas fa-truck-loading fa-3x" style="color: #4a148c;"></i>
            </div>
            <h2 class="fw-bold" style="color: #4a148c;">إدارة أسطول الموردين</h2>
            <p class="text-muted">محجوب أونلاين - <span class="text-warning fw-bold">نظام التتبع الجغرافي</span></p>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4 rounded-4">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small fw-bold">البحث الذكي (963 / الاسم / *)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="supplierSearch" class="form-control border-start-0" placeholder="أدخل بيانات المورد أو * للكل">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">المحافظة</label>
                    <select id="filterProvince" class="form-select">
                        <option value="">كل المحافظات</option>
                        <option value="الحديدة">الحديدة</option>
                        <option value="عدن">عدن</option>
                        <option value="تعز">تعز</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">المديرية</label>
                    <select id="filterDistrict" class="form-select">
                        <option value="">كل المديريات</option>
                        <option value="الخوخة">الخوخة</option>
                        <option value="حيس">حيس</option>
                        <option value="المخا">المخا</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100 py-2 fw-bold" onclick="searchSuppliers()">
                        <i class="fas fa-filter me-1"></i> تصفية
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate__animated animate__fadeInUp">
        <div class="card-header bg-white py-3 border-0">
            <h5 class="mb-0 fw-bold text-dark"><i class="fas fa-list-ul me-2 text-primary"></i> قائمة الموردين الميدانيين</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>المعرف</th>
                        <th>الاسم التجاري</th>
                        <th>الموقع الجغرافي</th>
                        <th>الرتبة</th>
                        <th>الحالة</th>
                        <th>العمليات</th>
                    </tr>
                </thead>
                <tbody id="suppliersTableBody">
                    <tr>
                        <td colspan="6" class="text-center py-5 text-muted">استخدم الفلاتر أعلاه لبدء استدعاء البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">تعديل بيانات المورد</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">الرتبة الإدارية</label>
                        <select id="editTier" class="form-select">
                            <option value="مبتدئ">مبتدئ</option>
                            <option value="معتمد">معتمد</option>
                            <option value="ممتاز">ممتاز</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">الحالة</label>
                        <select id="editStatus" class="form-select">
                            <option value="active">نشط</option>
                            <option value="suspended">موقف</option>
                        </select>
                    </div>
                    <button type="button" onclick="confirmUpdate()" class="btn btn-primary w-100 py-2 fw-bold">حفظ التغييرات</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function searchSuppliers() {
    const q = document.getElementById('supplierSearch').value;
    const province = document.getElementById('filterProvince').value;
    const district = document.getElementById('filterDistrict').value;
    const tbody = document.getElementById('suppliersTableBody');

    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';

    fetch(`/admin/api/search-supplier?q=${encodeURIComponent(q)}&province=${province}&district=${district}`)
    .then(res => res.json())
    .then(data => {
        tbody.innerHTML = '';
        if (data.status === 'success') {
            data.suppliers.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-light text-dark border">963${s.id}</span></td>
                        <td class="fw-bold">${s.trade_name}</td>
                        <td><small>${s.province} - ${s.district}</small></td>
                        <td><span class="badge bg-soft-primary text-primary">${s.tier}</span></td>
                        <td><span class="badge ${s.status === 'active' ? 'bg-success' : 'bg-danger'}">${s.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick='openEditModal(${JSON.stringify(s)})'>
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger">لا توجد نتائج تطابق البحث</td></tr>';
        }
    });
}

function openEditModal(s) {
    document.getElementById('editId').value = s.id;
    document.getElementById('editTier').value = s.tier;
    document.getElementById('editStatus').value = s.status;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

function confirmUpdate() {
    const id = document.getElementById('editId').value;
    const data = {
        tier: document.getElementById('editTier').value,
        status: document.getElementById('editStatus').value
    };

    fetch(`/admin/api/update-supplier/${id}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        location.reload();
    });
}
</script>

<style>
    .bg-soft-primary { background-color: #e3f2fd; color: #0d6efd; }
    .table th { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; }
    .form-select, .form-control { border-radius: 8px; border: 1px solid #dee2e6; }
</style>
{% endblock %}
