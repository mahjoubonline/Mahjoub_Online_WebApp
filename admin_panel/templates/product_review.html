<div class="table-responsive table-sovereign-wrapper">
    <table class="table table-sovereign align-middle">
        <thead>
            <tr>
                <th>المنتج (سحب آلي)</th>
                <th>معرف Q-ID</th>
                <th>تكلفة المصدر</th>
                <th>حالة الربط</th>
                <th>التحكم الإستراتيجي</th>
            </tr>
        </thead>
        <tbody>
            {% for item in pulled_data %}
            <tr>
                <td>
                    <div class="d-flex align-items-center">
                        <img src="{{ item.image_url }}" class="rounded-circle me-3" style="width: 40px; border: 1px solid var(--mahjoub-gold);">
                        <span class="text-white fw-bold">{{ item.name }}</span>
                    </div>
                </td>
                <td><code class="text-gold">{{ item.qumra_id }}</code></td>
                <td class="text-info fw-bold">{{ item.source_price }} $</td>
                <td>
                    <span class="badge rounded-pill {% if item.is_synced %}bg-success{% else %}bg-warning{% endif %} bg-opacity-10 text-{{ 'success' if item.is_synced else 'warning' }}">
                        {{ 'متزامن' if item.is_synced else 'قيد المراجعة' }}
                    </span>
                </td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-success border-0"><i class="fas fa-check-double"></i> اعتماد</button>
                        <button class="btn btn-sm btn-outline-light border-0"><i class="fas fa-eye"></i> معاينة</button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
