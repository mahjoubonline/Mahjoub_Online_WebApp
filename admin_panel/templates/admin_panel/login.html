<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | برج الرقابة المركزية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mahjoub-purple: #632C8F;
            --mahjoub-gold: #D4AF37;
            --bg-dark: #050505;
            --glass-bg: rgba(10, 10, 10, 0.85);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            color: white;
            overflow: hidden;
        }

        /* تأثير الخلفية المتحركة */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            animation: moveBg 60s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            from { transform: translate(0,0); }
            to { transform: translate(-50%, -50%); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(99, 44, 143, 0.1);
            text-align: center;
            position: relative;
            transition: 0.5s;
        }

        .login-container:hover {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 30px 70px rgba(0,0,0,0.9), 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .logo-section h2 {
            font-weight: 900;
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            color: var(--mahjoub-gold);
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: right;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #cbd5e1;
            margin-right: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--mahjoub-gold);
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 50px 14px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-family: 'Cairo';
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--mahjoub-gold);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--mahjoub-purple), #4a1d6d);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 12px;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(99, 44, 143, 0.5);
            border-color: var(--mahjoub-gold);
            filter: brightness(1.2);
        }

        .flash-msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            background: rgba(239, 68, 68, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-bottom: 20px;
            list-style: none;
            animation: shake 0.5s ease-in-out;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            margin-top: 35px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .glow-ring {
            position: absolute;
            width: 150px; height: 150px;
            background: var(--mahjoub-purple);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="glow-ring" style="top: -50px; left: -50px;"></div>
    <div class="glow-ring" style="bottom: -50px; right: -50px; background: var(--mahjoub-gold);"></div>

    <div class="login-container">
        <div class="logo-section">
            <h2>MAHJOUB | <span style="color: var(--mahjoub-gold);">ONLINE</span></h2>
            <p>نظام الولوج السيادي</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg">
                <i class="fas fa-shield-alt"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_panel.admin_login') }}" method="POST">
            <div class="form-group">
                <label>معرف القائد</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-control" placeholder="اسم المستخدم" required autofocus autocomplete="off">
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>

            <div class="form-group">
                <label>مفتاح التشفير</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    <i class="fas fa-key"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <span>ولوج آمن</span>
                <i class="fas fa-unlock-alt"></i>
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 محجوب أونلاين | برج الرقابة المركزية
        </div>
    </div>

</body>
</html>
