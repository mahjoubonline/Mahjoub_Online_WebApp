<div class="card border-0 shadow-sm p-4 mb-4 bg-white animate__animated animate__fadeInDown" 
     style="border-radius: 20px; border-right: 6px solid var(--gov-purple) !important;">
    
    <form method="GET" class="row g-3 align-items-end" id="filterForm">
        
        <div class="col-lg-3">
            <label class="small fw-bold mb-2" style="color: var(--gov-purple);">
                <i class="fas fa-search me-1"></i> البحث الشامل
            </label>
            <input type="text" name="q" class="form-control border-2 shadow-none" 
                   placeholder="اسم، هاتف، أو ID..." 
                   value="{{ request.args.get('q', '') }}" 
                   style="border-radius: 10px; padding: 10px; background: #f8fafc;">
        </div>
        
        <div class="col-lg-3">
            <label class="small fw-bold mb-2" style="color: var(--gov-purple);">
                <i class="fas fa-map-marker-alt me-1"></i> المحافظة
            </label>
            <select name="province" id="provinceSelect" class="form-select border-2 shadow-none" style="border-radius: 10px; padding: 10px;">
                <option value="">كل المحافظات</option>
                </select>
        </div>

        <div class="col-lg-3">
            <label class="small fw-bold mb-2" style="color: var(--gov-purple);">
                <i class="fas fa-location-arrow me-1"></i> المديرية
            </label>
            <select name="district" id="districtSelect" class="form-select border-2 shadow-none" style="border-radius: 10px; padding: 10px;">
                <option value="">كل المديريات</option>
            </select>
        </div>

        <div class="col-lg-3">
            <button type="submit" class="btn btn-gov-action w-100 fw-bold shadow-sm" 
                    style="border-radius: 12px; height: 48px; background: var(--gov-purple); color: white; border: 2px solid var(--gov-gold);">
                <i class="fas fa-filter me-2"></i> تصفية النتائج
            </button>
        </div>

    </form>
</div>

<script>
    // استخدام نفس البيانات الجغرافية الموجودة في ملف add_supplier.html لضمان التطابق
    const geoData = {
        "الحديدة": ["الخوخة", "حيس", "الحوك", "الميناء", "زبيد", "بيت الفقيه"],
        "أمانة العاصمة": ["السبعين", "التحرير", "الثورة", "صنعاء القديمة"],
        "عدن": ["المنصورة", "كريتر", "الشيخ عثمان", "البريقة"],
        "تعز": ["المخاء", "القاهرة", "المظفر"]
    };

    const pSelect = document.getElementById('provinceSelect');
    const dSelect = document.getElementById('districtSelect');

    // تعبئة المحافظات عند التحميل
    Object.keys(geoData).sort().forEach(p => {
        const option = new Option(p, p);
        if (p === "{{ request.args.get('province', '') }}") option.selected = true;
        pSelect.add(option);
    });

    // تحديث المديريات آلياً
    pSelect.addEventListener('change', function() {
        const prov = this.value;
        dSelect.innerHTML = '<option value="">كل المديريات</option>';
        if(geoData[prov]) {
            geoData[prov].sort().forEach(d => dSelect.add(new Option(d, d)));
        }
    });

    // تشغيل التحديث فوراً إذا كانت هناك محافظة مختارة مسبقاً
    if(pSelect.value) {
        const currentDist = "{{ request.args.get('district', '') }}";
        geoData[pSelect.value].sort().forEach(d => {
            const option = new Option(d, d);
            if (d === currentDist) option.selected = true;
            dSelect.add(option);
        });
    }
</script>

<style>
    :root { --gov-purple: #632C8F; --gov-gold: #C5A021; }
    .btn-gov-action:hover { background: #4a1d6d !important; transform: translateY(-2px); }
</style>
