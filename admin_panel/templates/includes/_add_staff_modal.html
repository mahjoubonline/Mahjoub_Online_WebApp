<div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-dark text-white border-0">
                <h6 class="modal-title fw-bold"><i class="fas fa-user-shield ms-2"></i> إضافة موظف للحساب</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-3">
                <div class="mb-3">
                    <label class="small fw-bold mb-1">اسم مستخدم الموظف</label>
                    <input type="text" id="staff_username" class="form-control sovereign-input" placeholder="مثلاً: ali_staff1">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold mb-1">كلمة المرور اليدوية</label>
                    <input type="password" id="staff_password" class="form-control sovereign-input" placeholder="أدخل كلمة مرور قوية">
                </div>
                <button onclick="executeAddStaff()" class="btn btn-royal w-100 py-2">
                    <i class="fas fa-plus-circle ms-1"></i> تعميد الموظف
                </button>
            </div>
        </div>
    </div>
</div>
