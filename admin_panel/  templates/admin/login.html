
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الإدارة | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a; /* أسود عميق */
            color: #d4af37; /* ذهبي ملكي */
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* خلفية هندسية بسيطة (المثلثات) */
        .geometry-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0f0f 25%, transparent 25%) -50px 0,
                        linear-gradient(-45deg, #0f0f0f 25%, transparent 25%) -50px 0;
            background-size: 100px 100px;
            z-index: -1;
            opacity: 0.5;
        }
        .login-card {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border: 1px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 350px;
        }
        .eye-icon {
            font-size: 50px;
            margin-bottom: 20px;
            /* هنا يمكن وضع أيقونة العين داخل المثلث */
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            text-align: center;
        }
        button {
            background: #d4af37;
            color: black;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            box-shadow: 0 0 15px #d4af37;
        }
    </style>
</head>
<body>
    <div class="geometry-bg"></div>
    <div class="login-card">
        <div class="eye-icon">👁️</div> <h2>محجوب أونلاين</h2>
        <form>
            <input type="text" placeholder="اسم المستخدم (بالعربي)" required>
            <input type="password" placeholder="كلمة المرور" required>
            <br><br>
            <button type="submit">دخول السيادة</button>
        </form>
    </div>
</body>
</html>
