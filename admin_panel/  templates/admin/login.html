<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محجوب أونلاين - دخول</title>
    <style>
        :root {
            --primary-color: #4B0082; /* بنفسجي ملكي */
            --gold-color: #D4AF37;    /* ذهبي */
            --white-color: #ffffff;
        }
        body {
            background: linear-gradient(135deg, #4B0082 0%, #2e004f 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
        }
        .admin-login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--gold-color);
            text-align: center;
        }
        .admin-login-box h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .gold-line {
            height: 3px;
            width: 50px;
            background: var(--gold-color);
            margin: 0 auto 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: var(--gold-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="admin-login-box">
        <h2>لوحة الإدارة</h2>
        <div class="gold-line"></div>
        <p style="color: #666; font-size: 14px;">مرحباً بك في مركز تحكم محجوب أونلاين</p>
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>اسم المسؤول</label>
                <input type="text" name="admin_user" placeholder="أدخل اليوزر" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" name="admin_pass" placeholder="********" required>
            </div>
            <button type="submit">دخول آمن</button>
        </form>
    </div>
</body>
</html>
