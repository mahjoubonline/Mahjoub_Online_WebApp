<script>
// بروتوكول الاستدعاء والتحكم - محجوب أونلاين
const SupplierControl = {
    // 1. استدعاء بيانات المورد من القاعدة
    async search() {
        const query = document.getElementById('supplierSearch').value;
        const feedback = document.getElementById('searchFeedback');
        
        if (!query) return;

        feedback.innerHTML = '<span class="text-primary animate__animated animate__flash animate__infinite">جاري استدعاء البيانات السيادية...</span>';

        try {
            const response = await fetch('/api/supplier/fetch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const result = await response.json();

            if (result.status === 'success') {
                this.displayData(result.data);
                feedback.innerHTML = '<span class="text-success">تم الاتصال بالقاعدة بنجاح ✅</span>';
            } else {
                feedback.innerHTML = `<span class="text-danger">${result.message}</span>`;
            }
        } catch (error) {
            feedback.innerHTML = '<span class="text-danger">خطأ في الاتصال بالخادم</span>';
        }
    },

    // 2. توزيع البيانات على الشبكة الأفقية
    displayData(data) {
        document.getElementById('controlArea').classList.remove('d-none');
        
        // تعبئة شريط الحالة العلوي
        document.getElementById('displayTradeName').innerText = data.trade_name;
        document.getElementById('displaySupID').innerText = data.sup_id;
        document.getElementById('displayTier').innerText = data.tier;
        document.getElementById('displayStatusBadge').innerText = data.status;
        document.getElementById('displayWalletID').innerText = data.wallet_id;

        // تعبئة نموذج التحكم
        document.getElementById('phone').value = data.phone;
        document.getElementById('activity').value = data.activity;
        document.getElementById('province').value = data.province;
        document.getElementById('tier').value = data.tier;
        document.getElementById('status').value = data.status;
        
        // حفظ المعرف الداخلي للعمليات القادمة
        this.currentSupplierId = data.id;
    },

    // 3. تحديث البيانات (حفظ التغييرات)
    async save() {
        const payload = {
            id: this.currentSupplierId,
            phone: document.getElementById('phone').value,
            activity: document.getElementById('activity').value,
            province: document.getElementById('province').value,
            tier: document.getElementById('tier').value,
            status: document.getElementById('status').value
        };

        const response = await fetch('/api/supplier/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        alert(result.message);
        if(result.status === 'success') location.reload(); // لتحديث الحالة البصرية
    },

    // 4. إضافة مستخدم فرعي (موظف)
    async addSubUser() {
        const name = document.getElementById('subName').value;
        const role = document.getElementById('subRole').value;

        const response = await fetch('/api/supplier/add-subuser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                role: role,
                supplier_id: this.currentSupplierId
            })
        });
        const result = await response.json();
        alert(result.message);
    }
};

// ربط الأزرار بالوظائف
function searchSupplier() { SupplierControl.search(); }
function saveData() { SupplierControl.save(); }
function addSubUser() { SupplierControl.addSubUser(); }
</script>
