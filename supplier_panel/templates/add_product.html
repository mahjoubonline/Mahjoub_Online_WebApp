{% extends "supplier_panel/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg" style="border: 2px solid #632C8F;">
        <div class="card-header text-white" style="background: linear-gradient(45deg, #632C8F, #4B338A);">
            <h4 class="mb-0">🚀 إضافة منتج جديد للترسانة</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>اسم المنتج (كما يظهر في قمرة)</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>معرف المنتج في قمرة (Product ID)</label>
                        <input type="text" name="q_product_id" class="form-control" placeholder="مثلاً: 650..." required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>فئة المنتج (من قمرة)</label>
                        <select class="form-control" name="collection_id">
                            {% for col in collections %}
                                <option value="{{ col.id }}">{{ col.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>تكلفة المورد (الصافي)</label>
                        <input type="number" step="0.01" name="cost_price" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>العملة</label>
                        <select class="form-control" name="currency">
                            <option value="SAR">ريال سعودي</option>
                            <option value="USD">دولار أمريكي</option>
                            <option value="YER">ريال يمني</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn text-white w-100" style="background-color: #632C8F;">
                    تعميد المنتج وإرساله للمراجعة
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
