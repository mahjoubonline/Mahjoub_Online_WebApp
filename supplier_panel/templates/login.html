<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة شركاء النجاح | دخول الموردين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <style>
        :root {
            --royal-purple: #632C8F;
            --pure-white: #ffffff;
            --soft-white: #f8f9fa;
            --gold-accent: #D4AF37;
            --deep-dark: #0f0f0f;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* خلفية بيضاء متدرجة احترافية */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* حاوية الدخول الزجاجية */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(99, 44, 143, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* الزخرفة العلوية */
        .login-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 5px;
            background: var(--royal-purple);
            border-radius: 0 0 10px 10px;
        }

        .brand-logo {
            font-size: 2.5rem;
            color: var(--royal-purple);
            margin-bottom: 10px;
        }

        h3 {
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* تصميم حقول الإدخال */
        .form-label {
            font-weight: 600;
            color: var(--royal-purple);
            margin-bottom: 8px;
            display: block;
            text-align: right;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control {
            height: 55px;
            border-radius: 15px;
            border: 2px solid #eee;
            padding-right: 45px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: var(--royal-purple);
            box-shadow: 0 0 10px rgba(99, 44, 143, 0.1);
            background-color: var(--soft-white);
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            z-index: 10;
        }

        /* الزر الملكي */
        .btn-royal {
            background: var(--royal-purple);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(99, 44, 143, 0.3);
            margin-top: 10px;
        }

        .btn-royal:hover {
            background: #4a1f6d;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(99, 44, 143, 0.4);
            color: var(--gold-accent);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #999;
        }

        /* رسائل التنبيه */
        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-logo">
            <i class="fas fa-handshake"></i>
        </div>
        
        <h3>بوابة <span style="color: var(--royal-purple);">شركاء النجاح</span></h3>
        <p class="subtitle">محجوب أونلاين - منصة التجارة الذكية</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('supplier_panel.login') }}" method="POST">
            <div class="text-start">
                <label class="form-label small px-2">اسم المورد</label>
                <div class="input-group-custom">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" class="form-control" placeholder="أدخل اسمك العربي المسجل" required>
                </div>
            </div>

            <div class="text-start">
                <label class="form-label small px-2">كلمة المرور</label>
                <div class="input-group-custom">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-royal">
                <i class="fas fa-sign-in-alt me-2"></i> ولوج الآمن للمنصة
            </button>
        </form>

        <div class="footer-text">
            جميع الحقوق محفوظة © 2026 محجوب أونلاين <br>
            <span style="color: var(--gold-accent); font-weight: bold;">بإدارة القائد علي محجوب</span>
        </div>
    </div>

</body>
</html>
