{% extends "admin/admin_base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

<style>
    :root { --mahjoub-purple: #632C8F; }
    .mahjoub-toolbar { background: #fff; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-right: 5px solid var(--mahjoub-purple); }
    .stat-card { border-radius: 15px; border: none; color: white; padding: 20px; }
    .bg-profit { background: var(--mahjoub-purple); }
    .bg-debit { background: #d32f2f; }
    .bg-credit { background: #2e7d32; }
    .bg-balance { background: #1565c0; }
    
    /* تنسيق Select2 للهوية البنفسجية */
    .select2-container--default .select2-selection--single { height: 45px !important; padding: 8px !important; border: 1px solid #ced4da; border-radius: 10px; }
    .select2-container--default .select2-results__option--highlighted[aria-selected] { background-color: var(--mahjoub-purple) !important; }
    .btn-mahjoub { background-color: var(--mahjoub-purple); color: white; border-radius: 10px; }
    .btn-mahjoub:hover { background-color: #4a216b; color: white; }
    .text-purple { color: var(--mahjoub-purple); }
</style>

<div class="container-fluid py-4">
    <div class="card mahjoub-toolbar p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="small fw-bold text-muted mb-2">البحث الذكي عن المورد</label>
                <select id="supplierSearch" class="form-control" style="width: 100%;"></select>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">العملة</label>
                <select id="currencyFilter" class="form-select">
                    <option value="ALL">كل العملات</option>
                    {% for curr in currencies %}<option value="{{ curr }}">{{ curr }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="small fw-bold text-muted mb-2">تحديد الفترة الزمنية</label>
                <div id="reportrange" class="form-control" style="cursor: pointer; height: 45px; display: flex; align-items: center;">
                    <i class="fa fa-calendar me-2"></i> <span></span>
                </div>
            </div>
            <div class="col-md-2">
                <button class="btn btn-mahjoub w-100 py-2" onclick="loadFinancialData()"><i class="fas fa-sync"></i> تحديث النتائج</button>
            </div>
        </div>
    </div>

    <div id="summaryCards" class="row mb-4" style="display: none;">
        <div class="col-md-3"><div class="card stat-card bg-profit"><h6>إجمالي الأرباح</h6><h2 id="totalProfit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-debit"><h6>إجمالي المدين (عليه)</h6><h2 id="totalDebit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-credit"><h6>إجمالي الدائن (له)</h6><h2 id="totalCredit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-balance"><h6>صافي الرصيد الحالي</h6><h2 id="netBalance">0.00</h2></div></div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-white py-3 border-0">
            <h6 class="mb-0 fw-bold text-purple"><i class="fas fa-list-ul me-2"></i> سجل العمليات المالي</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>التاريخ</th><th>البيان</th><th>المرجع/السند</th>
                        <th class="text-center">مدين</th><th class="text-center">دائن</th>
                        <th class="text-center">الرصيد التراكمي</th>
                    </tr>
                </thead>
                <tbody id="statementBody">
                    <tr><td colspan="6" class="text-center py-5 text-muted">يرجى اختيار المورد وتحديد الفترة لعرض البيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

<script>
    var pickerStart = moment().subtract(29, 'days');
    var pickerEnd = moment();

    $(function() {
        // تهيئة البحث الذكي عبر AJAX
        $('#supplierSearch').select2({
            placeholder: "ابحث بالاسم، المتجر، أو الرقم الموحد...",
            ajax: {
                url: '/api/suppliers/search',
                dataType: 'json',
                delay: 250,
                data: function (params) { return { q: params.term }; },
                processResults: function (data) { return { results: data.results }; },
                cache: true
            },
            minimumInputLength: 1
        });

        // تهيئة ديت رينج بيكر
        $('#reportrange').daterangepicker({
            startDate: pickerStart, endDate: pickerEnd,
            ranges: {
               'اليوم': [moment(), moment()],
               'آخر 7 أيام': [moment().subtract(6, 'days'), moment()],
               'هذا الشهر': [moment().startOf('month'), moment().endOf('month')]
            }
        }, function(start, end) {
            pickerStart = start; pickerEnd = end;
            $('#reportrange span').html(start.format('YYYY/MM/DD') + ' - ' + end.format('YYYY/MM/DD'));
        });
        $('#reportrange span').html(pickerStart.format('YYYY/MM/DD') + ' - ' + pickerEnd.format('YYYY/MM/DD'));
    });

    function loadFinancialData() {
        let supplierId = $('#supplierSearch').val();
        if(!supplierId) return alert('يرجى اختيار المورد أولاً');

        let url = `/api/statement/report?id=${supplierId}&currency=${$('#currencyFilter').val()}&start=${pickerStart.format('YYYY-MM-DD')}&end=${pickerEnd.format('YYYY-MM-DD')}`;

        fetch(url).then(res => res.json()).then(data => {
            if(data.error) return alert(data.error);
            
            $('#summaryCards').fadeIn();
            $('#totalProfit').text(data.summary.total_profit.toLocaleString());
            $('#totalDebit').text(data.summary.total_debit.toLocaleString());
            $('#totalCredit').text(data.summary.total_credit.toLocaleString());
            $('#netBalance').text(data.summary.net_balance.toLocaleString());

            let html = '';
            data.details.forEach(s => {
                html += `<tr>
                    <td class="small">${s.date}</td>
                    <td class="fw-bold">${s.desc}</td>
                    <td><span class="badge bg-secondary">${s.ref}</span></td>
                    <td class="text-center text-danger">${s.debit || '-'}</td>
                    <td class="text-center text-success">${s.credit || '-'}</td>
                    <td class="text-center fw-bold">${s.balance}</td>
                </tr>`;
            });
            $('#statementBody').html(html || '<tr><td colspan="6" class="text-center">لا توجد عمليات</td></tr>');
        });
    }
</script>
{% endblock %}
