{% extends "admin/admin_base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

<style>
    :root { --mahjoub-purple: #632C8F; }
    .mahjoub-toolbar { background: #fff; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-right: 5px solid var(--mahjoub-purple); }
    .stat-card { border-radius: 15px; border: none; color: white; padding: 20px; transition: transform 0.2s ease; }
    .stat-card:hover { transform: translateY(-3px); }
    .bg-profit { background: var(--mahjoub-purple); }
    .bg-debit { background: #d32f2f; }
    .bg-credit { background: #2e7d32; }
    .bg-balance { background: #1565c0; }
    .btn-mahjoub { background-color: var(--mahjoub-purple); color: white; border-radius: 10px; }
    .btn-pdf { background-color: #27ae60; color: white; border-radius: 10px; }
    .btn-wallet { background-color: #007bff; color: white; border-radius: 10px; border: none; }
</style>

<div class="container-fluid py-4" style="direction: rtl; text-align: right;">
    <div class="card mahjoub-toolbar p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-2">البحث الذكي عن المورد</label>
                <select id="supplierSearch" class="form-control" style="width: 100%;"></select>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">ملخص الأرصدة</label>
                <button class="btn btn-wallet w-100" style="height: 45px;" onclick="loadAllWalletsSummary()">
                    <i class="fas fa-wallet"></i> عرض ملخص المحافظ
                </button>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">العملة</label>
                <select id="currencyFilter" class="form-select" style="height: 45px; border-radius: 10px;">
                    <option value="ALL">كل العملات</option>
                    {% for curr in currencies %}<option value="{{ curr }}">{{ curr }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">الفترة الزمنية</label>
                <div id="reportrange" class="form-control" style="cursor: pointer; height: 45px; display: flex; align-items: center; border-radius: 10px;">
                    <i class="fa fa-calendar me-2 text-muted"></i> <span></span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="d-flex gap-2">
                    <button class="btn btn-mahjoub flex-grow-1" onclick="loadFinancialData()"><i class="fas fa-sync"></i> تحديث</button>
                    <button id="btnExportPDF" class="btn btn-pdf flex-grow-1"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>
    </div>

    <div id="summaryCards" class="row mb-4">
        <div class="col-md-3"><div class="card stat-card bg-profit"><h6>إجمالي الأرباح</h6><h2 id="totalProfit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-debit"><h6>إجمالي المدين</h6><h2 id="totalDebit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-credit"><h6>إجمالي الدائن</h6><h2 id="totalCredit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-balance"><h6>صافي الرصيد</h6><h2 id="netBalance">0.00</h2></div></div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-white py-3 border-0">
            <h6 class="mb-0 fw-bold text-purple" id="tableTitle"><i class="fas fa-list-ul me-2"></i> سجل العمليات المالي</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light" id="tableHeader">
                    <tr>
                        <th>التاريخ</th><th>البيان</th><th>المرجع/السند</th>
                        <th class="text-center">العملة</th><th class="text-center">مدين</th>
                        <th class="text-center">دائن</th><th class="text-center">الرصيد التراكمي</th>
                    </tr>
                </thead>
                <tbody id="statementBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    var pickerStart = moment().startOf('month');
    var pickerEnd = moment();

    $(function() {
        // إعداد التقويم مع الخيار السنوي
        $('#reportrange').daterangepicker({
            startDate: pickerStart, endDate: pickerEnd,
            ranges: {
               'اليوم': [moment(), moment()],
               'هذا الشهر': [moment().startOf('month'), moment().endOf('month')],
               'هذا العام': [moment().startOf('year'), moment().endOf('year')],
               'العام السابق': [moment().subtract(1, 'year').startOf('year'), moment().subtract(1, 'year').endOf('year')]
            }
        }, function(start, end) {
            pickerStart = start; pickerEnd = end;
            $('#reportrange span').html(start.format('YYYY/MM/DD') + ' - ' + end.format('YYYY/MM/DD'));
            loadFinancialData();
        });
        
        // ربط زر الـ PDF
        $('#btnExportPDF').on('click', function() {
            let url = "{{ url_for('statement_blueprint.export_report_pdf') }}?supplier_id=" + ($('#supplierSearch').val() || 'ALL') + 
                      "&currency=" + $('#currencyFilter').val() + 
                      "&start_date=" + pickerStart.format('YYYY-MM-DD') + 
                      "&end_date=" + pickerEnd.format('YYYY-MM-DD');
            window.open(url, '_blank');
        });
    });

    function loadAllWalletsSummary() {
        $('#summaryCards').fadeOut();
        $('#tableTitle').html('<i class="fas fa-wallet me-2"></i> ملخص أرصدة المحافظ (WEL)');
        $('#tableHeader').html('<tr><th>الاسم</th><th>المالك</th><th>كود المحفظة (WEL)</th><th>الرصيد</th><th>الحالة</th></tr>');
        
        fetch("{{ url_for('statement_blueprint.api_get_all_summary') }}?currency=" + $('#currencyFilter').val())
        .then(res => res.json()).then(data => {
            let html = '';
            data.results.forEach(s => {
                html += `<tr><td>${s.trade_name}</td><td>${s.owner_name}</td><td><code>${s.wallet_code}</code></td>
                         <td>${s.balance.toLocaleString()}</td><td><span class="badge ${s.balance >= 0 ? 'bg-success' : 'bg-danger'}">${s.balance >= 0 ? 'دائن' : 'مدين'}</span></td></tr>`;
            });
            $('#statementBody').html(html);
        });
    }
    // ... بقية الدوال (loadFinancialData) تبقى كما هي مع التأكد من تمرير العملة
</script>
{% endblock %}
