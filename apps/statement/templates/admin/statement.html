{% extends "admin/admin_base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

<style>
    :root { --mahjoub-purple: #632C8F; }
    .mahjoub-toolbar { background: #fff; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-right: 5px solid var(--mahjoub-purple); }
    .stat-card { border-radius: 15px; border: none; color: white; padding: 20px; transition: transform 0.2s ease; }
    .stat-card:hover { transform: translateY(-3px); }
    .bg-profit { background: var(--mahjoub-purple); }
    .bg-debit { background: #d32f2f; }
    .bg-credit { background: #2e7d32; }
    .bg-balance { background: #1565c0; }
    
    .select2-container--default .select2-selection--single { height: 45px !important; padding: 8px !important; border: 1px solid #ced4da; border-radius: 10px; }
    .select2-container--default .select2-results__option--highlighted[aria-selected] { background-color: var(--mahjoub-purple) !important; }
    .btn-mahjoub { background-color: var(--mahjoub-purple); color: white; border-radius: 10px; }
    .btn-mahjoub:hover { background-color: #4a216b; color: white; }
    .btn-pdf { background-color: #27ae60; color: white; border-radius: 10px; }
    .btn-pdf:hover { background-color: #1e7e46; color: white; }
    .btn-back { background-color: #6c757d; color: white; border-radius: 10px; }
    .btn-back:hover { background-color: #545b62; color: white; }
    /* إضافة تنسيق زر المحافظ */
    .btn-wallet { background-color: #007bff; color: white; border-radius: 10px; border: none; }
    .btn-wallet:hover { background-color: #0069d9; color: white; }
    .text-purple { color: var(--mahjoub-purple); }
</style>

<div class="container-fluid py-4" style="direction: rtl; text-align: right;">
    <div class="card mahjoub-toolbar p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-2">البحث الذكي عن المورد</label>
                <select id="supplierSearch" class="form-control" style="width: 100%;"></select>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">الإجراءات</label>
                <button class="btn btn-wallet w-100" style="height: 45px;" onclick="loadAllWalletsSummary()">
                    <i class="fas fa-wallet"></i> ملخص المحافظ
                </button>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">العملة</label>
                <select id="currencyFilter" class="form-select" style="height: 45px; border-radius: 10px;">
                    <option value="ALL">كل العملات</option>
                    {% for curr in currencies %}<option value="{{ curr }}">{{ curr }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="small fw-bold text-muted mb-2">تحديد الفترة الزمنية</label>
                <div id="reportrange" class="form-control" style="cursor: pointer; height: 45px; display: flex; align-items: center; border-radius: 10px;">
                    <i class="fa fa-calendar me-2 text-muted"></i> &nbsp;<span></span>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="d-flex gap-2">
                    <button class="btn btn-mahjoub flex-grow-1 py-2" onclick="loadFinancialData()">
                        <i class="fas fa-sync"></i> تحديث
                    </button>
                    <button id="btnExportPDF" class="btn btn-pdf flex-grow-1 py-2">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="summaryCards" class="row mb-4">
        <div class="col-md-3"><div class="card stat-card bg-profit"><h6>إجمالي الأرباح</h6><h2 id="totalProfit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-debit"><h6>إجمالي المدين</h6><h2 id="totalDebit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-credit"><h6>إجمالي الدائن</h6><h2 id="totalCredit">0.00</h2></div></div>
        <div class="col-md-3"><div class="card stat-card bg-balance"><h6>صافي الرصيد</h6><h2 id="netBalance">0.00</h2></div></div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-white py-3 border-0">
            <h6 class="mb-0 fw-bold text-purple" id="tableTitle"><i class="fas fa-list-ul me-2"></i> سجل العمليات المالي</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light" id="tableHeader">
                    <tr>
                        <th>التاريخ</th><th>البيان</th><th>المرجع/السند</th>
                        <th class="text-center">العملة</th><th class="text-center">مدين</th>
                        <th class="text-center">دائن</th><th class="text-center">الرصيد التراكمي</th>
                    </tr>
                </thead>
                <tbody id="statementBody">
                    <tr><td colspan="7" class="text-center py-5 text-muted">يرجى اختيار المورد أو العرض الشامل لرصد البيانات الحالية</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

<script>
    var pickerStart = moment().subtract(29, 'days');
    var pickerEnd = moment();

    // دالة عرض ملخص المحافظ
    function loadAllWalletsSummary() {
        $('#summaryCards').fadeOut();
        $('#tableTitle').html('<i class="fas fa-wallet me-2"></i> ملخص أرصدة المحافظ');
        $('#tableHeader').html('<tr><th>الاسم التجاري</th><th>اسم المالك</th><th>كود المحفظة</th><th class="text-center">الرصيد الحالي</th><th class="text-center">الحالة</th></tr>');
        $('#statementBody').html('<tr><td colspan="5" class="text-center py-5"><i class="fas fa-spinner fa-spin me-2"></i> جاري تحميل بيانات المحافظ...</td></tr>');
        
        fetch("{{ url_for('statement_blueprint.api_get_all_summary') }}")
        .then(res => res.json())
        .then(data => {
            let html = '';
            data.results.forEach(s => {
                html += `<tr>
                    <td class="fw-bold">${s.trade_name}</td>
                    <td>${s.owner_name}</td>
                    <td><code>${s.wallet_code}</code></td>
                    <td class="text-center fw-bold">${s.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="text-center"><span class="badge ${s.balance >= 0 ? 'bg-success' : 'bg-danger'}">${s.balance >= 0 ? 'رصيد دائن' : 'رصيد مدين'}</span></td>
                </tr>`;
            });
            $('#statementBody').html(html);
        });
    }

    $(function() {
        $('#supplierSearch').select2({
            placeholder: "ابحث عن مورد، أو اختر العرض الشامل...",
            allowClear: true,
            ajax: {
                url: "{{ url_for('statement_blueprint.api_search_suppliers') }}",
                dataType: 'json',
                delay: 250,
                data: function (params) { return { q: params.term }; },
                processResults: function (data) { 
                    var customResults = data.results;
                    customResults.unshift({ id: 'ALL', text: '🔍 جميع الحسابات والموردين (عرض شامل)' });
                    return { results: customResults }; 
                },
                cache: true
            }
        });

        $('#supplierSearch').on('select2:select', function (e) { loadFinancialData(); });
        $('#currencyFilter').on('change', function() { loadFinancialData(); });

        $('#reportrange').daterangepicker({
            startDate: pickerStart, endDate: pickerEnd,
            locale: { format: 'YYYY/MM/DD', applyLabel: 'تطبيق', cancelLabel: 'إلغاء' },
            ranges: {
               'اليوم': [moment(), moment()],
               'آخر 7 أيام': [moment().subtract(6, 'days'), moment()],
               'هذا الشهر': [moment().startOf('month'), moment().endOf('month')],
               'الشهر السابق': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
            }
        }, function(start, end) {
            pickerStart = start; pickerEnd = end;
            $('#reportrange span').html(start.format('YYYY/MM/DD') + ' - ' + end.format('YYYY/MM/DD'));
            loadFinancialData();
        });
        $('#reportrange span').html(pickerStart.format('YYYY/MM/DD') + ' - ' + pickerEnd.format('YYYY/MM/DD'));

        $('#btnExportPDF').on('click', function() {
            let supplierId = $('#supplierSearch').val() || 'ALL';
            let selectedCurrency = $('#currencyFilter').val();
            window.open("{{ url_for('statement_blueprint.export_report_pdf') }}?supplier_id=" + supplierId + "&currency=" + selectedCurrency + "&start_date=" + pickerStart.format('YYYY-MM-DD') + "&end_date=" + pickerEnd.format('YYYY-MM-DD'), '_blank');
        });
        
        loadFinancialData();
    });

    function loadFinancialData() {
        // إعادة تهيئة العناوين إذا تم الضغط على تحديث
        $('#tableTitle').html('<i class="fas fa-list-ul me-2"></i> سجل العمليات المالي');
        $('#tableHeader').html('<tr><th>التاريخ</th><th>البيان</th><th>المرجع/السند</th><th class="text-center">العملة</th><th class="text-center">مدين</th><th class="text-center">دائن</th><th class="text-center">الرصيد التراكمي</th></tr>');

        let supplierId = $('#supplierSearch').val() || 'ALL';
        let selectedCurrency = $('#currencyFilter').val();
        let url = "{{ url_for('statement_blueprint.api_get_report') }}?id=" + supplierId + "&currency=" + selectedCurrency + "&start=" + pickerStart.format('YYYY-MM-DD') + "&end=" + pickerEnd.format('YYYY-MM-DD');

        $('#statementBody').html('<tr><td colspan="7" class="text-center py-4"><i class="fas fa-spinner fa-spin me-2"></i> جاري جلب البيانات...</td></tr>');

        fetch(url).then(res => res.json()).then(data => {
            if(data.error) return alert(data.error);
            $('#summaryCards').fadeIn();
            
            $('#totalProfit').text(data.summary.total_profit.toLocaleString(undefined, {minimumFractionDigits: 2}));
            $('#totalDebit').text(data.summary.total_debit.toLocaleString(undefined, {minimumFractionDigits: 2}));
            $('#totalCredit').text(data.summary.total_credit.toLocaleString(undefined, {minimumFractionDigits: 2}));
            $('#netBalance').text(data.summary.net_balance.toLocaleString(undefined, {minimumFractionDigits: 2}));

            let html = '';
            data.details.forEach(s => {
                html += `<tr>
                    <td class="small text-muted">${s.date}</td>
                    <td class="fw-bold">${s.desc}</td>
                    <td><span class="badge bg-light text-dark border">${s.ref}</span></td>
                    <td class="text-center fw-bold text-secondary">${s.currency}</td>
                    <td class="text-center text-danger fw-bold">${s.debit > 0 ? s.debit.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td class="text-center text-success fw-bold">${s.credit > 0 ? s.credit.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td class="text-center fw-bold text-primary">${s.balance.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                </tr>`;
            });
            $('#statementBody').html(html);
        });
    }
</script>
{% endblock %}
