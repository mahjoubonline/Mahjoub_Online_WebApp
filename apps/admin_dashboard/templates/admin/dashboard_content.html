{% extends "admin_base.html" %}

{% block title %}مركز المراقبة | محجوب أونلاين{% endblock %}

{% block content %}
<!-- بداية منطقة المحتوى السيادي لمركز المراقبة -->
<div id="main-content">
    <div class="row g-4">
        <!-- كرت إحصائي 1: المستخدمين -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid #D4AF37 !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-users fa-2x" style="color: #4B0082;"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">المستخدمين النشطين</h6>
                        <h3 class="fw-bold mb-0">1,250</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- كرت إحصائي 2: الطلبات -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid #D4AF37 !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-shopping-cart fa-2x text-success"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">الطلبات اليومية</h6>
                        <h3 class="fw-bold mb-0">85</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- كرت إحصائي 3: حالة النظام -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3" style="border-right: 5px solid #D4AF37 !important;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-3 me-3">
                        <i class="fas fa-chart-line fa-2x text-warning"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">حالة النظام</h6>
                        <h3 class="fw-bold mb-0 text-success">مستقر</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم الرسالة الترحيبية السيادية -->
    <div class="mt-5 p-5 bg-white rounded-4 shadow-sm text-center">
        <h2 class="fw-bold" style="color: #4B0082;">مرحباً بك في القيادة المركزية</h2>
        <p class="text-muted">هنا يمكنك إدارة كافة عمليات "محجوب أونلاين" السيادية والمراقبة الفورية.</p>
        <button class="btn px-4 py-2" style="background: #D4AF37; color: white; border-radius: 8px; border: none; font-weight: bold;">
            تحديث البيانات <i class="fas fa-sync-alt ms-2"></i>
        </button>
    </div>
</div>
{% endblock %}
