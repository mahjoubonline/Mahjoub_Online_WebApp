<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #632C8F; 
            --deep-black: #08020d; 
            --mahjoub-gold: #D4AF37;
            --sidebar-width: 280px; 
            --sidebar-mini: 80px; 
            --transition: all 0.3s ease;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }

        /* 👑 تصميم شريط التنقل الجانبي الأيمن ثنائي الأبعاد */
        .sidebar {
            width: var(--sidebar-width); 
            background: linear-gradient(180deg, var(--royal-purple) 0%, var(--deep-black) 100%);
            height: 100vh; 
            position: fixed; 
            right: 0; 
            top: 0; 
            z-index: 1100; 
            transition: var(--transition);
            display: flex; 
            flex-direction: column; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
        }

        @media (max-width: 992px) {
            .sidebar { width: var(--sidebar-mini); align-items: center; }
            .sidebar .nav-link span, .sidebar .sidebar-header h2, .sidebar .fa-chevron-left { display: none !important; }
            .main-wrapper { margin-right: var(--sidebar-mini) !important; width: calc(100% - var(--sidebar-mini)) !important; }
            .sidebar:hover { width: var(--sidebar-width); align-items: stretch; }
            .sidebar:hover .nav-link span, .sidebar:hover .sidebar-header h2 { display: block !important; }
            .sidebar:hover .fa-chevron-left { display: block !important; }
        }

        .sidebar-header { padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .logo-img { width: 60px; height: auto; filter: brightness(0) invert(1); }
        .nav-menu { padding: 1rem; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .nav-link { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            color: rgba(255,255,255,0.8); 
            text-decoration: none; 
            border-radius: 12px; 
            margin-bottom: 5px; 
            transition: var(--transition); 
            cursor: pointer;
        }
        .nav-link:hover { background: rgba(212, 175, 55, 0.2); color: var(--mahjoub-gold); }
        
        /* 🎛️ حاوية المحتوى الرئيسي للوحة التحكم */
        .main-wrapper { margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); transition: var(--transition); }
        
        .top-bar { 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 2rem; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        
        .dropdown-container { 
            display: none; 
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 12px; 
            margin-bottom: 10px; 
            padding: 5px;
        }
        
        .rotate { transform: rotate(-90deg); transition: var(--transition); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="Logo">
            <h2 class="text-white h6 mt-2 fw-bold">محجوب أونلاين</h2>
        </div>

        <nav class="nav-menu">
            <a href="/admin/dashboard" class="nav-link">
                <i class="fas fa-chart-line ms-3"></i> <span>مركز القيادة</span>
            </a>

            <button class="nav-link w-100 border-0 bg-transparent text-start" onclick="toggleDropdown('supDrp', 'supArr')" style="outline: none;">
                <i class="fas fa-handshake ms-3"></i> <span>شركاء النجاح</span> 
                <i class="fas fa-chevron-left ms-auto" id="supArr"></i>
            </button>
            <div class="dropdown-container" id="supDrp">
                <a href="javascript:void(0);" onclick="loadMicroAppInline('/suppliers/add_supplier', 'تعميد مورد جديد ومحفظة سيادية')" class="nav-link small py-2">
                    <i class="fas fa-user-plus ms-2"></i> تعميد جديد
                </a>
                <a href="javascript:void(0);" onclick="loadMicroAppInline('/admin/suppliers/list', 'سجل شركاء النجاح والموردين المعتمدين')" class="nav-link small py-2">
                    <i class="fas fa-database ms-2"></i> سجل الموردين
                </a>
            </div>

            <a href="javascript:void(0);" onclick="loadMicroAppInline('/admin/wallet', 'الفضاء المالي وإدارة الخزائن')" class="nav-link">
                <i class="fas fa-wallet ms-3"></i> <span>الفضاء المالي</span>
            </a>
            <a href="javascript:void(0);" onclick="loadMicroAppInline('/admin/settings/sovereignty', 'إعدادات السيادة والأمن المركزي')" class="nav-link">
                <i class="fas fa-shield-halved ms-3"></i> <span>إعدادات السيادة</span>
            </a>
            
            <a href="/auth/logout" class="nav-link text-danger mt-auto">
                <i class="fas fa-power-off ms-3"></i> <span>خروج آمن</span>
            </a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="top-bar">
            <h4 class="mb-0 fw-bold" id="page-main-title">{% block header_title %}مركز القيادة والسيطرة{% endblock %}</h4>
            <div class="badge bg-light text-dark border p-2 fw-semibold">
                <i class="fas fa-user-shield me-1 text-muted"></i> مسجل الصلاحيات
            </div>
        </header>
        
        <div class="p-4" id="dynamic-content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // دالة إزاحة وفتح القوائم الجانبية المنسدلة
        function toggleDropdown(id, arrowId) {
            const el = document.getElementById(id);
            const arrow = document.getElementById(arrowId);
            if (el.style.display === "block") {
                el.style.display = "none";
                arrow.classList.remove("rotate");
            } else {
                el.style.display = "block";
                arrow.classList.add("rotate");
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
