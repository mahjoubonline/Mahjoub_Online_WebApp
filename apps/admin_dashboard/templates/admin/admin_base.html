<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #632C8F; 
            --deep-black: #08020d; 
            --mahjoub-gold: #D4AF37;
            --sidebar-width: 280px; 
            --sidebar-mini: 80px; 
            --transition: all 0.3s ease;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }

        /* شريط التنقل الجانبي الأيمن */
        .sidebar {
            width: var(--sidebar-width); 
            background: linear-gradient(180deg, var(--royal-purple) 0%, var(--deep-black) 100%);
            height: 100vh; 
            position: fixed; 
            right: 0; 
            top: 0; 
            z-index: 1100; 
            transition: var(--transition);
            display: flex; 
            flex-direction: column; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
        }

        @media (max-width: 992px) {
            .sidebar { width: var(--sidebar-mini); align-items: center; }
            .sidebar .nav-link span, .sidebar .sidebar-header h2, .sidebar .fa-chevron-left { display: none !important; }
            .main-wrapper { margin-right: var(--sidebar-mini) !important; width: calc(100% - var(--sidebar-mini)) !important; }
            .sidebar:hover { width: var(--sidebar-width); align-items: stretch; }
            .sidebar:hover .nav-link span, .sidebar:hover .sidebar-header h2 { display: block !important; }
            .sidebar:hover .fa-chevron-left { display: block !important; }
        }

        .sidebar-header { padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .logo-img { width: 60px; height: auto; filter: brightness(0) invert(1); }
        .nav-menu { padding: 1rem; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .nav-link { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            color: rgba(255,255,255,0.8); 
            text-decoration: none; 
            border-radius: 12px; 
            margin-bottom: 5px; 
            transition: var(--transition); 
        }
        .nav-link:hover { background: rgba(212, 175, 55, 0.2); color: var(--mahjoub-gold); }
        
        .main-wrapper { margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); transition: var(--transition); }
        
        .top-bar { 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 2rem; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        
        .dropdown-container { 
            display: none; 
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 12px; 
            margin-bottom: 10px; 
            padding: 5px;
        }
        
        .rotate { transform: rotate(-90deg); transition: var(--transition); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="Logo">
            <h2 class="text-white h6 mt-2 fw-bold">محجوب أونلاين</h2>
        </div>

        <nav class="nav-menu">
            <a href="{{ url_for('admin_dashboard.dashboard_home') }}" class="nav-link">
                <i class="fas fa-chart-line ms-3"></i> <span>مركز القيادة</span>
            </a>

            <button class="nav-link w-100 border-0 bg-transparent text-start" onclick="toggleDropdown('supDrp', 'supArr')" style="outline: none;">
                <i class="fas fa-handshake ms-3"></i> <span>شركاء النجاح</span> 
                <i class="fas fa-chevron-left ms-auto transition-all" id="supArr"></i>
            </button>
            <div class="dropdown-container" id="supDrp">
                <a href="javascript:void(0);" onclick="loadSupplierFormInline()" class="nav-link small py-2">
                    <i class="fas fa-user-plus ms-2"></i> تعميد جديد
                </a>
                <a href="{{ url_for('admin_dashboard.list_suppliers') }}" class="nav-link small py-2">
                    <i class="fas fa-database ms-2"></i> سجل الموردين
                </a>
            </div>

            <a href="{{ url_for('admin_wallet.wallet_page') }}" class="nav-link">
                <i class="fas fa-wallet ms-3"></i> <span>الفضاء المالي</span>
            </a>
            <a href="{{ url_for('admin_dashboard.system_settings') }}" class="nav-link">
                <i class="fas fa-shield-halved ms-3"></i> <span>إعدادات السيادة</span>
            </a>
            
            <a href="{{ url_for('auth_portal.logout') }}" class="nav-link text-danger mt-auto">
                <i class="fas fa-power-off ms-3"></i> <span>خروج آمن</span>
            </a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="top-bar">
            <h4 class="mb-0 fw-bold" id="page-main-title">{% block header_title %}مركز المراقبة{% endblock %}</h4>
            <div class="badge bg-light text-dark border p-2 fw-semibold">
                <i class="fas fa-user-shield me-1 text-muted"></i> {{ current_user.username if current_user.is_authenticated else 'مسؤول النظام' }}
            </div>
        </header>
        
        <div class="p-4" id="dynamic-content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleDropdown(id, arrowId) {
            const el = document.getElementById(id);
            const arrow = document.getElementById(arrowId);
            
            if (el.style.display === "block") {
                el.style.display = "none";
                arrow.classList.remove("rotate");
            } else {
                el.style.display = "block";
                arrow.classList.add("rotate");
            }
        }

        // 🧠 السكريبت المطور لحقن استمارة تسجيل المورد صامتاً داخل نفس المساحة
        function loadSupplierFormInline() {
            const contentArea = document.getElementById('dynamic-content-area');
            const titleArea = document.getElementById('page-main-title');
            
            if (contentArea) {
                // إظهار واجهة انتظار متحركة ممتازة
                contentArea.innerHTML = `
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                        <h5 class="mt-3 text-muted fw-bold">جاري استدعاء حزمة تعميد الموردين والمحافظ...</h5>
                    </div>
                `;
                
                // جلب محتوى الاستمارة صامتاً من السيرفر دون إعادة تحميل
                fetch('/suppliers/add_supplier')
                    .then(response => {
                        if(!response.ok) throw new Error('فشل في تحميل مسار الملف الفرعي.');
                        return response.text();
                    })
                    .then(htmlContent => {
                        // حقن المحتوى وتحديث العنوان بنجاح
                        contentArea.innerHTML = htmlContent;
                        if(titleArea) titleArea.innerText = "إضافة مورد جديد في محجوب أونلاين";
                    })
                    .catch(error => {
                        contentArea.innerHTML = `
                            <div class="alert alert-danger shadow-sm border-0 d-flex align-items-center" role="alert">
                                <i class="fas fa-exclamation-triangle me-3 fs-4"></i>
                                <div>حدث خطأ أثناء تحميل الاستمارة: ${error.message}</div>
                            </div>
                        `;
                    });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const currentUrl = window.location.pathname;
            if (currentUrl.includes('/suppliers') || currentUrl.includes('/list_suppliers')) {
                const el = document.getElementById('supDrp');
                const arrow = document.getElementById('supArr');
                if (el) el.style.display = "block";
                if (arrow) arrow.classList.add("rotate");
            }
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
