<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #1a0b2e;
            --deep-black: #08020d;
            --mahjoub-gold: #D4AF37;
        }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; }
        .sidebar {
            width: 280px; background: linear-gradient(180deg, var(--royal-purple) 0%, var(--deep-black) 100%);
            height: 100vh; position: fixed; right: 0; top: 0; z-index: 1000; overflow-y: auto;
        }
        .nav-link { display: flex; align-items: center; padding: 14px 15px; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 12px; cursor: pointer; }
        .nav-link:hover { background: rgba(212, 175, 55, 0.15); color: var(--mahjoub-gold); }
        .dropdown-content { display: none; list-style: none; padding: 0 35px 0 0; margin: 5px 0; }
        .dropdown-content a { color: #aaa; text-decoration: none; padding: 10px 0; display: block; font-size: 0.9rem; }
        .main-wrapper { margin-right: 280px; }
        .top-navbar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .content-body { padding: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container p-4 text-center">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" style="width: 70px; filter: brightness(0) invert(1);">
            <h6 class="text-white mt-3">الإدارة المركزية</h6>
        </div>

        <nav class="nav-menu px-3">
            <a href="{{ url_for('admin_dashboard.dashboard') }}" class="nav-link"><i class="fas fa-chart-line me-3"></i> <span>الإحصائيات</span></a>
            
            <div class="nav-item-wrapper">
                <div class="nav-link" onclick="toggleSub(this)"><i class="fas fa-box-open me-3"></i> <span>المنتجات</span> <i class="fas fa-chevron-down ms-auto"></i></div>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('mahjoub_bridge.dashboard') }}">إدارة الجسر والمنتجات</a></li>
                    </ul>
            </div>

            <div class="nav-item-wrapper">
                <div class="nav-link" onclick="toggleSub(this)"><i class="fas fa-handshake me-3"></i> <span>الموردين</span> <i class="fas fa-chevron-down ms-auto"></i></div>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('add_supplier.add_supplier') }}">إضافة مورد</a></li>
                </ul>
            </div>

            <div class="nav-item-wrapper">
                <div class="nav-link" onclick="toggleSub(this)"><i class="fas fa-wallet me-3"></i> <span>الرقابة المالية</span> <i class="fas fa-chevron-down ms-auto"></i></div>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('vault_bp.vault_dashboard') }}">خزينة المنصة</a></li>
                    <li><a href="{{ url_for('wallet_app.dashboard') }}">محفظة الموردين</a></li>
                </ul>
            </div>

            <hr class="text-white my-3">
            <a href="{{ url_for('auth_portal.logout') }}" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-3"></i> <span>خروج آمن</span></a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="top-navbar">
            <span class="user-name"><i class="fas fa-user-circle me-2"></i> {{ current_user.username if current_user.is_authenticated else 'المسؤول' }}</span>
        </header>
        <section class="content-body">
            {% block content %}{% endblock %}
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggleSub(el) {
            let drop = el.nextElementSibling;
            drop.style.display = (drop.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
