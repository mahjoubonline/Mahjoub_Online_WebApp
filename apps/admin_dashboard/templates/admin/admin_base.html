<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #632C8F; /* اللون البنفسجي الملكي المعتمد للبراند */
            --royal-purple-dark: #4A1E6D; /* درجة أغمق للتفاعلات العميقة */
            --deep-black: #08020d;
            --mahjoub-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            overflow-x: hidden; 
            direction: rtl;
        }

        /* 🚀 تعديل الحاضن الرئيسي ليمتد بكامل عرض الشاشة بعد إزالة الشريط الجانبي */
        .main-wrapper { 
            margin-right: 0 !important; 
            width: 100% !important; 
            min-height: 100vh; 
            transition: var(--transition);
        }

        .top-bar { 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            height: 75px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 2rem; 
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .user-badge {
            background: rgba(99, 44, 143, 0.1);
            padding: 8px 20px; border-radius: 50px;
            border: 1px solid var(--royal-purple);
            color: var(--royal-purple); font-weight: 700;
        }

        #loader {
            display: none; position: fixed; inset: 0;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(5px);
            z-index: 9999; place-items: center;
        }
    </style>
</head>
<body>

    <div id="loader" class="d-none">
        <div class="spinner-grow" style="width: 3rem; height: 3rem; color: var(--royal-purple) !important;"></div>
    </div>

    <div class="main-wrapper">
        <header class="top-bar">
            <div class="d-flex align-items-center">
                <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="سوقك الذكي" style="height: 40px; width: auto; margin-left: 15px; filter: drop-shadow(0 0 4px rgba(99, 44, 143, 0.2));">
                <h4 class="mb-0 fw-bold text-dark">{% block header_title %}مركز المراقبة{% endblock %}</h4>
            </div>
            
            <div class="user-badge">
                <i class="fas fa-user-tie me-2"></i> {{ owner.full_name if owner else 'المؤسس علي' }}
            </div>
        </header>

        <div class="p-4 content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        window.onbeforeunload = function() {
            document.getElementById('loader').classList.remove('d-none');
            document.getElementById('loader').classList.add('d-grid');
        };

        document.addEventListener("DOMContentLoaded", function() {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => { // تم تصحيح الكلمة هنا من moals إلى modals لضمان الاستقرار
                modal.addEventListener('hidden.bs.modal', function () {
                    const form = modal.querySelector('form');
                    if(form) {
                        form.reset();
                        form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                        form.querySelectorAll('.is-valid').forEach(el => el.classList.remove('is-valid'));
                    }
                });
            });
        });
    </script>
</body>
</html>
