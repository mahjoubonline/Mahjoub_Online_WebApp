<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #632C8F;
            --royal-purple-dark: #4A1E6D;
            --deep-black: #08020d;
            --mahjoub-gold: #D4AF37;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --sidebar-width: 280px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; display: flex; overflow-x: hidden; direction: rtl; }
        .sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, var(--royal-purple) 0%, var(--royal-purple-dark) 100%); height: 100vh; position: fixed; right: 0; top: 0; z-index: 1100; transition: var(--transition); box-shadow: -5px 0 25px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        .sidebar-header { padding: 2.5rem 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.15); text-align: center; }
        .logo-img { width: 85px; height: auto; filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(255, 255, 255, 0.35)); margin-bottom: 15px; }
        .nav-menu { padding: 1.5rem 1rem; flex-grow: 1; overflow-y: auto; }
        .nav-link, .dropdown-btn { display: flex; align-items: center; padding: 14px 18px; color: rgba(255, 255, 255, 0.9); text-decoration: none; border-radius: 15px; margin-bottom: 8px; transition: var(--transition); cursor: pointer; border: none; background: transparent; width: 100%; font-weight: 600; text-align: right; }
        .nav-link:hover, .dropdown-btn:hover, .nav-link.active, .dropdown-btn.active { background: rgba(255, 255, 255, 0.15); color: var(--mahjoub-gold); transform: translateX(-5px); }
        .dropdown-container { display: none; background: rgba(0,0,0,0.15); border-radius: 12px; margin-bottom: 10px; overflow: hidden; animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-container a { padding: 12px 45px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); display: block; text-decoration: none; transition: 0.3s; }
        .dropdown-container a:hover { color: var(--mahjoub-gold); background: rgba(255,255,255,0.08); padding-right: 55px; }
        .main-wrapper { margin-right: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); min-height: 100vh; transition: var(--transition); }
        .top-bar { background: var(--glass-bg); backdrop-filter: blur(10px); height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .user-badge { background: rgba(99, 44, 143, 0.1); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--royal-purple); color: var(--royal-purple); font-weight: 700; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); z-index: 9999; place-items: center; }
        .fa-chevron-left { transition: 0.3s; margin-right: auto; }
        .rotate { transform: rotate(-90deg); }
        @media (max-width: 991px) { .sidebar { right: -280px; } .sidebar.active { right: 0; } .main-wrapper { margin-right: 0; width: 100%; } }
    </style>
</head>
<body>
    <div id="loader" class="d-none">
        <div class="spinner-grow" style="width: 3rem; height: 3rem; color: var(--royal-purple) !important;"></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="سوقك الذكي">
            <h2 class="text-white h5 fw-bold mb-1">محجوب أونلاين</h2>
        </div>

        <nav class="nav-menu">
            <a href="{{ url_for('admin_dashboard.dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard.dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line me-3"></i> <span>مركز القيادة</span>
            </a>

            <div class="dropdown-section">
                <button class="dropdown-btn" onclick="toggleDropdown('supplierDropdown', 'supplierArrow')">
                    <i class="fas fa-handshake me-3"></i> <span>شركاء النجاح</span>
                    <i class="fas fa-chevron-left" id="supplierArrow"></i>
                </button>
                <div class="dropdown-container" id="supplierDropdown">
                    <a href="{{ url_for('add_supplier.add_supplier_page') }}"><i class="fas fa-user-plus me-2"></i> تعميد مورد جديد</a>
                    <a href="{{ url_for('admin_dashboard.dashboard') }}"><i class="fas fa-database me-2"></i> سجل الموردين</a>
                </div>
            </div>

            <div class="dropdown-section">
                <button class="dropdown-btn" onclick="toggleDropdown('walletDropdown', 'walletArrow')">
                    <i class="fas fa-wallet me-3"></i> <span>إدارة العمليات المالية</span>
                    <i class="fas fa-chevron-left" id="walletArrow"></i>
                </button>
                <div class="dropdown-container" id="walletDropdown">
                    <a href="{{ url_for('financial_ops.display_management_table') }}"><i class="fas fa-scale-balanced me-2"></i> الطلبات والتسويات</a>
                    <a href="{{ url_for('statement_blueprint.view_statement') }}"><i class="fas fa-file-invoice-dollar me-2"></i> كشوفات الحسابات</a>
                </div>
            </div>

            <a href="{{ url_for('auth_portal.logout') }}" class="nav-link text-danger mt-auto">
                <i class="fas fa-power-off me-3"></i> <span>تسجيل خروج</span>
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <h4 class="mb-0 fw-bold">{% block header_title %}لوحة التحكم{% endblock %}</h4>
            <div class="user-badge">{{ current_user.username if current_user.is_authenticated else 'زائر' }}</div>
        </header>
        <div class="p-4 content-area">{% block content %}{% endblock %}</div>
    </div>

    <script>
        function toggleDropdown(id, arrow) {
            const drop = document.getElementById(id);
            const arr = document.getElementById(arrow);
            drop.style.display = (drop.style.display === "block") ? "none" : "block";
            arr.classList.toggle("rotate");
        }
    </script>
</body>
</html>
