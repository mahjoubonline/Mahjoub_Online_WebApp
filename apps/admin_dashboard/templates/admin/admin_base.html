<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}القيادة المركزية | محجوب أونلاين{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        :root {
            --royal-purple: #1a0b2e;
            --deep-black: #08020d;
            --mahjoub-gold: #D4AF37;
            --sidebar-width: 280px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; overflow-x: hidden; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--royal-purple) 0%, var(--deep-black) 100%);
            height: 100vh; position: fixed; right: 0; top: 0; z-index: 1000;
            transition: var(--transition); box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            overflow-y: auto;
        }
        
        .logo-container { padding: 25px 10px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .sidebar-logo { width: 60px; filter: brightness(0) invert(1); }
        .nav-menu { padding: 20px 15px; }
        .nav-link { display: flex; align-items: center; padding: 12px 15px; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 10px; transition: var(--transition); cursor: pointer; font-size: 0.95rem; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.15); color: var(--mahjoub-gold); }
        
        .dropdown-content { display: none; list-style: none; padding: 0 30px 0 0; margin: 5px 0; border-right: 2px solid var(--mahjoub-gold); }
        .dropdown-content a { color: #aaa; text-decoration: none; padding: 8px 0; display: block; font-size: 0.85rem; }
        
        .main-wrapper { margin-right: var(--sidebar-width); transition: var(--transition); min-height: 100vh; }
        .top-navbar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 999; }
        .content-body { padding: 25px; }

        @media (max-width: 992px) {
            .sidebar { right: -280px; }
            .sidebar.active { right: 0; }
            .main-wrapper { margin-right: 0; }
            .menu-toggle { display: block !important; }
        }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; color: var(--royal-purple); }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="sidebar-logo">
            <h6 class="text-white mt-2">القيادة المركزية</h6>
        </div>

        <nav class="nav-menu">
            <div class="nav-item-wrapper"><a href="{{ url_for('admin_dashboard.dashboard') }}" class="nav-link"><i class="fas fa-chart-line me-3"></i> <span>الإحصائيات</span></a></div>
            
            <div class="nav-item-wrapper">
                <div class="nav-link" onclick="toggleSub(this)"><i class="fas fa-handshake me-3"></i> <span>إدارة الموردين</span> <i class="fas fa-chevron-down ms-auto"></i></div>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('wallet_app.search_suppliers') }}">قائمة الموردين</a></li>
                </ul>
            </div>

            <div class="nav-item-wrapper">
                <div class="nav-link" onclick="toggleSub(this)"><i class="fas fa-wallet me-3"></i> <span>الرقابة المالية</span> <i class="fas fa-chevron-down ms-auto"></i></div>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('vault_bp.vault_dashboard') }}">خزينة المنصة</a></li>
                    <li><a href="{{ url_for('wallet_app.dashboard') }}">محفظة الموردين</a></li>
                </ul>
            </div>

            <hr class="text-white my-3">
            <a href="{{ url_for('auth_portal.logout') }}" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-3"></i> <span>خروج آمن</span></a>
        </nav>
    </aside>

    <main class="main-wrapper" id="main">
        <header class="top-navbar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="user-identity">
                <span class="fw-bold text-dark"><i class="fas fa-user-circle me-2"></i> {{ current_user.username if current_user.is_authenticated else 'المسؤول' }}</span>
            </div>
            <div class="badge bg-warning text-dark p-2">بيئة التحكم السيادية</div>
        </header>

        <section class="content-body">
            {% block content %}{% endblock %}
        </section>
    </main>

    <script>
        function toggleSub(el) {
            let drop = el.nextElementSibling;
            let isVisible = (drop.style.display === "block");
            drop.style.display = isVisible ? "none" : "block";
            el.querySelector('.fa-chevron-down').style.transform = isVisible ? "rotate(0deg)" : "rotate(180deg)";
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
