<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الشركاء الموحدة | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .wrapper { display: flex; width: 95%; max-width: 900px; background: rgba(15, 7, 28, 0.95); border: 1px solid #333; border-radius: 30px; overflow: hidden; }
        .side { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .btn-gold { padding: 15px; background: linear-gradient(90deg, #ce9e49, #9e7634); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; margin: 8px 0; width: 100%; transition: 0.3s; }
        .btn-gold:disabled { background: #555; cursor: not-allowed; }
        .cyber-input { background: #000; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; }
        .hidden { display: none; }
        .forgot-link { color: #666; font-size: 0.85rem; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
        #status-msg { padding: 12px; margin: 10px 0; border-radius: 12px; display: none; text-align: center; font-size: 0.9rem; }
        .marketing-side { background: linear-gradient(145deg, #160d26, #05020a); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side marketing-side">
        <h1 style="font-size: 2.2rem;">بوابة الشركاء <span style="color:var(--gold)">السيادية</span></h1>
        <p>نظام متكامل لإدارة الموردين والمسوقين بأعلى معايير الأمن الرقمي.</p>
    </div>
    
    <div class="side" id="auth-container">
        <div id="status-msg"></div>

        <div id="main-menu">
            <h3 style="color: var(--gold);">اختر نوع الدخول</h3>
            <button class="btn-gold" onclick="showForm('register')">الموردون (اشتراك أو دخول عبر واتساب)</button>
            <button class="btn-gold" style="background: #222; color: #fff;" onclick="showForm('marketer-login')">تسجيل دخول المسوقين</button>
        </div>

        <div id="register-form" class="hidden">
            <h3 style="color: var(--gold);">دخول الموردين</h3>
            <div style="display: flex; gap: 5px;">
                <select id="country-code" class="cyber-input" style="width: 35%;">
                    <option value="+967">+967</option>
                    <option value="+966">+966</option>
                </select>
                <input type="tel" id="reg-phone" class="cyber-input" placeholder="رقم الهاتف">
            </div>
            <button class="btn-gold" id="otp-btn" onclick="sendOtp()">إرسال رمز التحقق</button>
            
            <div id="otp-section" class="hidden">
                <input type="text" id="otp-input" class="cyber-input" placeholder="أدخل رمز التحقق (6 أرقام)">
                <button class="btn-gold" onclick="verifyOtp()">تأكيد الدخول</button>
                <button class="btn-gold" id="resend-btn" style="background:#222; color:#fff;" onclick="sendOtp()">إعادة إرسال الرمز</button>
            </div>
            <button onclick="showForm('menu')" style="background:none; border:none; color:#666; cursor:pointer; margin-top:10px;">رجوع</button>
        </div>

        <div id="marketer-login" class="hidden">
            <h3 style="color: var(--gold);">دخول المسوقين</h3>
            <input type="text" id="marketer-user" class="cyber-input" placeholder="اسم المستخدم">
            <input type="password" id="marketer-pass" class="cyber-input" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="loginMarketer()">تسجيل الدخول</button>
            <span class="forgot-link" onclick="showMessage('تواصل مع إدارة النظام لاستعادة الوصول', 'error')">هل نسيت كلمة المرور؟</span>
            <button onclick="showForm('menu')" style="background:none; border:none; color:#666; cursor:pointer; margin-top:10px;">رجوع</button>
        </div>
    </div>
</div>

<script>
    function showMessage(text, type) {
        const msgDiv = document.getElementById('status-msg');
        msgDiv.innerText = text;
        msgDiv.style.display = "block";
        msgDiv.style.background = type === 'error' ? "rgba(220, 53, 69, 0.2)" : "rgba(40, 167, 69, 0.2)";
        msgDiv.style.color = type === 'error' ? "#ff4d4d" : "#28a745";
    }

    function showForm(formType) {
        document.getElementById('status-msg').style.display = 'none';
        document.querySelectorAll('#auth-container > div:not(#status-msg)').forEach(div => div.classList.add('hidden'));
        if (formType === 'menu') document.getElementById('main-menu').classList.remove('hidden');
        else if (formType === 'register') document.getElementById('register-form').classList.remove('hidden');
        else if (formType === 'marketer-login') document.getElementById('marketer-login').classList.remove('hidden');
    }

    async function apiCall(data) {
        const response = await fetch('/vendors/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        return await response.json();
    }

    async function sendOtp() {
        const phone = document.getElementById('country-code').value + document.getElementById('reg-phone').value;
        const btn = document.getElementById('otp-btn');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;
        
        const res = await apiCall({type: 'vendor', phone: phone});
        if(res.status === 'success') {
            showMessage(res.message, 'success');
            document.getElementById('otp-btn').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
            startTimer(60);
        } else { showMessage(res.message, 'error'); btn.innerText = "إرسال رمز التحقق"; btn.disabled = false; }
    }

    async function verifyOtp() {
        // تأكد من دمج كود الدولة مع الرقم عند الإرسال
        const fullPhone = document.getElementById('country-code').value + document.getElementById('reg-phone').value;
        const otp = document.getElementById('otp-input').value;
        
        const res = await apiCall({type: 'vendor', phone: fullPhone, otp: otp});
        if(res.status === 'success') {
            window.location.href = res.redirect;
        } else {
            showMessage(res.message, 'error');
        }
    }

    async function loginMarketer() {
        const res = await apiCall({
            type: 'marketer', 
            username: document.getElementById('marketer-user').value,
            password: document.getElementById('marketer-pass').value
        });
        if(res.status === 'success') window.location.href = res.redirect;
        else showMessage(res.message, 'error');
    }

    function startTimer(duration) {
        let timer = duration;
        const btn = document.getElementById('resend-btn');
        const interval = setInterval(() => {
            timer--;
            btn.innerText = "إعادة إرسال (" + timer + ")";
            if(timer <= 0) { clearInterval(interval); btn.innerText = "إعادة إرسال الرمز"; btn.disabled = false; }
        }, 1000);
    }
</script>
</body>
</html>
