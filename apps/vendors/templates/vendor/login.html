<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الشركاء | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }
        .wrapper { display: flex; width: 90%; max-width: 1000px; margin: 50px auto; background: var(--card-bg); border: 1px solid #222; border-radius: 20px; overflow: hidden; }
        .side { flex: 1; padding: 40px; }
        .login-side { border-left: 1px solid #222; }
        .marketing-side { background: #0a0614; display: flex; flex-direction: column; justify-content: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { opacity: 0.9; }
        .badge-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { flex: 1; padding: 10px; background: #160d26; border: 1px solid #333; border-radius: 10px; text-align: center; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side login-side" id="auth-area">
        <h3>بوابة الشركاء الكرام</h3>
        <div class="badge-row">
            <div class="badge">معرف النظام<br>MAH-SUP963</div>
            <div class="badge">المحفظة السيادية<br>MAH-WEL963</div>
        </div>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني للمورد">
        
        <div style="display: flex; gap: 10px; margin: 10px 0;">
            <select id="country-code" style="width: 35%; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; padding: 10px; text-align: center;">
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+967">🇾🇪 +967</option>
                <option value="+20">🇪🇬 +20</option>
                <option value="+965">🇰🇼 +965</option>
                <option value="+968">🇴🇲 +968</option>
                <option value="+974">🇶🇦 +974</option>
                <option value="+973">🇧🇭 +973</option>
                <option value="+962">🇯🇴 +962</option>
                <option value="+961">🇱🇧 +961</option>
            </select>
            <input type="tel" id="phone" placeholder="رقم الهاتف الإداري" style="flex: 1; margin: 0;">
        </div>

        <button class="btn-gold" onclick="sendOtp()">إرسال رمز التأكيد <i class="fas fa-paper-plane"></i></button>
        
        <div style="margin-top: 20px; text-align: center; color: var(--gold); cursor: pointer;" onclick="quickLogin()">
            <i class="fas fa-bolt"></i> دخول سريع عابر للأنظمة
        </div>
    </div>

    <div class="side marketing-side">
        <h1 style="font-size: 2rem;">سوقك الذكي بأعلى المعايير العالمية</h1>
        <p style="color: #aaa;">اللامركزية في الحوكمة تبدأ من هنا، حيث يربط المورد بضاعته بالمتاجر في منصة واحدة.</p>
    </div>
</div>

<script>
    let currentEmail = "";

    async function sendOtp() {
        const email = document.getElementById('email').value;
        const countryCode = document.getElementById('country-code').value;
        const phoneNum = document.getElementById('phone').value;
        
        // دمج رمز الدولة مع الرقم لإرساله كقيمة واحدة
        const fullPhone = countryCode + phoneNum;
        currentEmail = email;
        
        const res = await fetch('/vendors/login', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ email, phone: fullPhone }) 
        });
        
        if (res.ok) {
            document.getElementById('auth-area').innerHTML = `
                <h3>تأكيد الدخول</h3>
                <p style="font-size: 0.9rem; color: #888;">تم إرسال الرمز إلى: ${email}</p>
                <input type="text" id="otp" placeholder="أدخل رمز الـ OTP">
                <button class="btn-gold" onclick="verify()">دخول آمن</button>
            `;
        } else {
            alert("خطأ في الاتصال بالسيرفر، تأكد من البيانات.");
        }
    }

    async function verify() {
        const otp = document.getElementById('otp').value;
        const res = await fetch('/vendors/login', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ email: currentEmail, otp: otp }) 
        });
        
        const result = await res.json();
        if (result.status === 'success') {
            window.location.href = result.redirect;
        } else {
            alert(result.message || "رمز التحقق غير صحيح");
        }
    }

    async function quickLogin() {
        const res = await fetch('/vendors/quick-login', { method: 'POST' });
        const result = await res.json();
        if (result.status === 'success') window.location.href = result.redirect;
        else alert("خطأ في الدخول السريع");
    }
</script>
</body>
</html>
