<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموردين | محجوب أونلاين</title>
    <link rel="stylesheet" href="{{ url_for('vendors.static', filename='css/vendor_login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h2>بوابة الموردين</h2>
            <p>أهلاً بك في منصة محجوب أونلاين</p>
        </div>
        
        <form action="{{ url_for('vendors.login') }}" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="login-btn">دخول</button>
        </form>
    </div>
</body>
</html>
