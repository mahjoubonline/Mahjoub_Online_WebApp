<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين | بوابة الشركاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; }
        
        /* Header - مخفي في الموبايل أو مصغر */
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area img { width: 40px; filter: brightness(0) invert(1); }
        .nav-links a { color: #aaa; text-decoration: none; margin-left: 15px; font-size: 0.85rem; }

        /* Wrapper - تعديل ليكون عمودياً في الشاشات الصغيرة */
        .wrapper { display: flex; width: 90%; max-width: 1100px; margin: 20px auto; background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(206,158,73,0.1); }
        
        .login-side, .marketing-side { flex: 1; padding: 30px; }
        .marketing-side { background: rgba(0,0,0,0.2); }

        /* التجاوب (السر الحقيقي) */
        @media (max-width: 900px) {
            .wrapper { flex-direction: column; } /* تحويل التصميم لعمودي في التابلت والموبايل */
            header { flex-direction: column; gap: 10px; }
            .nav-links { display: none; } /* إخفاء القائمة في الموبايل */
        }

        @media (max-width: 480px) {
            .wrapper { width: 95%; margin: 10px auto; border-radius: 15px; }
            .login-side, .marketing-side { padding: 20px; }
            h1 { font-size: 1.5rem !important; }
        }

        /* العناصر الأساسية */
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #000; }
        .badge-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .badge { flex: 1; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp">
        <strong>MAHJOUB ONLINE</strong>
    </div>
    <div class="nav-links">
        <a href="#">المميزات</a><a href="#">نظام المسوقين</a><a href="#">GraphQL</a>
    </div>
</header>

<div class="wrapper">
    <div class="login-side">
        <h3>بوابة الشركاء الكرام</h3>
        <div class="badge-row">
            <div class="badge">معرف النظام<br>MAH-SUP963</div>
            <div class="badge">المحفظة<br>MAH-WEL963</div>
        </div>
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="tel" placeholder="رقم الهاتف الإداري">
        <button class="btn-main">إرسال رمز التأكيد</button>
        <p style="text-align: center; color: var(--gold); font-size: 0.8rem; cursor: pointer;">⚡ دخول سريع عابر للأنظمة</p>
    </div>

    <div class="marketing-side">
        <h1 style="font-size: 1.8rem;">سوقك الذكي بأعلى المعايير العالمية</h1>
        <p style="color: #aaa; font-size: 0.9rem;">نضمن للموردين والتجار تجربة نشر مركزية فائقة الدقة لإلغاء التشتت ومضاعفة الأرباح.</p>
        <div style="border: 1px dashed var(--gold); padding: 15px; border-radius: 10px;">
            <input type="text" placeholder="اسم منتجك...">
            <button class="btn-main" style="background: transparent; border: 1px solid var(--gold); color: var(--gold);">إدراج فوري</button>
        </div>
    </div>
</div>

</body>
</html>
