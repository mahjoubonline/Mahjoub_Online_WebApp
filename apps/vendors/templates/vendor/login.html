<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الشركاء | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; --text: #fff; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .wrapper { display: flex; width: 90%; max-width: 900px; background: var(--card-bg); border-radius: 20px; overflow: hidden; }
        .side { flex: 1; padding: 40px; }
        .login-side { background: #120921; }
        h3 { color: var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; }
        .phone-group { display: flex; gap: 10px; }
        .btn-gold { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side login-side" id="auth-area">
        <h3 id="form-title">ابدأ رحلة الشراكة</h3>
        <div id="auth-fields">
            <input type="email" id="email" placeholder="البريد الإلكتروني الرسمي">
            <div class="phone-group">
                <select id="country-code"><option value="+966">🇸🇦 +966</option><option value="+967">🇾🇪 +967</option></select>
                <input type="tel" id="phone" placeholder="رقم الهاتف">
            </div>
            <button class="btn-gold" onclick="authGateway()">التالي</button>
        </div>
    </div>
</div>

<script>
    let userData = {};

    // 1. بوابة التحقق من وجود المستخدم
    async function authGateway() {
        userData.email = document.getElementById('email').value;
        userData.country_code = document.getElementById('country-code').value;
        userData.phone = document.getElementById('phone').value;

        const res = await fetch('/vendors/auth-gateway', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(userData)
        });
        const data = await res.json();
        
        document.getElementById('auth-area').innerHTML = `
            <h3>التحقق من الهوية</h3>
            <p>أدخل رمز التحقق المرسل عبر واتساب</p>
            <input type="text" id="otp-code" placeholder="------" style="text-align:center;">
            <button class="btn-gold" onclick="verifyOTP()">تحقق</button>
        `;
    }

    // 2. التحقق من الرمز
    async function verifyOTP() {
        const otp = document.getElementById('otp-code').value;
        const res = await fetch('/vendors/verify-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: userData.email, otp: otp })
        });
        
        if((await res.json()).status === 'success') {
            document.getElementById('auth-area').innerHTML = `
                <h3>البيانات التجارية</h3>
                <input type="text" id="trade_name" placeholder="الاسم التجاري">
                <input type="text" id="owner_name" placeholder="اسم المالك">
                <input type="text" id="bank_acc" placeholder="رقم الحساب البنكي">
                <input type="text" id="username" placeholder="اسم المستخدم">
                <input type="password" id="password" placeholder="كلمة المرور">
                <button class="btn-gold" onclick="register()">إتمام التسجيل</button>
            `;
        }
    }

    // 3. إتمام الربط الداخلي النهائي
    async function register() {
        userData.trade_name = document.getElementById('trade_name').value;
        userData.owner_name = document.getElementById('owner_name').value;
        userData.bank_acc = document.getElementById('bank_acc').value;
        userData.username = document.getElementById('username').value;
        userData.password = document.getElementById('password').value;

        const res = await fetch('/vendors/register-complete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(userData)
        });
        
        if((await res.json()).status === 'success') {
            window.location.href = "/vendors/dashboard";
        }
    }
</script>
</body>
</html>
