<!-- 📂 apps/suppliers_product/templates/suppliers/includes/_product_empty.html -->

<div class="text-center py-5">
    <div class="mb-4">
        <i class="fas fa-box-open fa-5x text-muted" style="opacity: 0.2;"></i>
    </div>
    <h4 class="fw-bold text-dark mb-2">📦 لا توجد منتجات</h4>
    <p class="text-muted mb-3">
        {% if search %}
            لا توجد منتجات تطابق <strong>"{{ search }}"</strong>
        {% else %}
            لم تقم بإضافة أي منتجات حتى الآن
        {% endif %}
    </p>
    
    {% if search %}
        <button onclick="document.getElementById('searchInput').value=''; document.getElementById('searchInput').dispatchEvent(new Event('keyup'));" 
                class="btn btn-outline-secondary px-4">
            <i class="fas fa-undo me-2"></i> عرض الكل
        </button>
    {% else %}
        <a href="{{ url_for('suppliers_product.add_product') }}" class="btn btn-custom px-4 shadow-sm">
            <i class="fas fa-plus me-2"></i> إضافة منتج جديد
        </a>
    {% endif %}
</div>

<style>
    .btn-custom { 
        background-color: var(--dark-purple, #2d0b36); 
        color: #fff; 
        border: none; 
        transition: all 0.3s ease;
        padding: 10px 30px;
        border-radius: 50px;
        font-weight: 600;
    }
    .btn-custom:hover { 
        background-color: #4a1558; 
        color: #fff; 
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(45, 11, 54, 0.3);
    }
</style>
