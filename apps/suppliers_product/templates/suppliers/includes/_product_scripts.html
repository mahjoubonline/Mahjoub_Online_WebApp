<!-- 📂 apps/suppliers_product/templates/suppliers/includes/_product_scripts.html -->

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // ============================================
        // ✅ فتح المنتج عند النقر على البطاقة
        // ============================================
        window.openProduct = function(qid) {
            if (qid) {
                window.location.href = `{{ url_for('suppliers_product.product_detail', qid='') }}${qid}`;
            }
        };
        
        // ============================================
        // ✅ البحث المباشر
        // ============================================
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results-container');
        let timeout = null;

        if (searchInput) {
            searchInput.addEventListener('keyup', function() {
                clearTimeout(timeout);
                const query = this.value.trim();
                const currentFilter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
                const perPage = document.getElementById('perPageSelect')?.value || 20;
                
                timeout = setTimeout(() => {
                    fetch(`{{ url_for('suppliers_product.my_products') }}?search=${encodeURIComponent(query)}&filter=${currentFilter}&per_page=${perPage}`, {
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    })
                    .then(res => res.text())
                    .then(html => {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const newResults = doc.getElementById('results-container');
                        if (newResults) {
                            resultsContainer.innerHTML = newResults.innerHTML;
                        }
                    })
                    .catch(err => console.error('Search error:', err));
                }, 400);
            });
        }

        // ============================================
        // ✅ فلتر المنتجات
        // ============================================
        window.applyFilter = function(filter, btn) {
            // تحديث حالة الأزرار
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const search = document.getElementById('searchInput')?.value || '';
            const perPage = document.getElementById('perPageSelect')?.value || 20;
            
            // جلب المنتجات المفلترة
            fetch(`{{ url_for('suppliers_product.my_products') }}?filter=${filter}&search=${encodeURIComponent(search)}&per_page=${perPage}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newResults = doc.getElementById('results-container');
                if (newResults) {
                    resultsContainer.innerHTML = newResults.innerHTML;
                }
            })
            .catch(err => console.error('Filter error:', err));
        };

        // ============================================
        // ✅ التنقل بين الصفحات
        // ============================================
        window.goToPage = function(page) {
            if (page === undefined || page === null) return;
            
            const search = document.getElementById('searchInput')?.value || '';
            const filter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
            const perPage = document.getElementById('perPageSelect')?.value || 20;
            
            fetch(`{{ url_for('suppliers_product.my_products') }}?page=${page}&filter=${filter}&search=${encodeURIComponent(search)}&per_page=${perPage}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newResults = doc.getElementById('results-container');
                if (newResults) {
                    resultsContainer.innerHTML = newResults.innerHTML;
                }
                // التمرير لأعلى
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(err => console.error('Pagination error:', err));
        };

        // ============================================
        // ✅ تغيير عدد المنتجات في الصفحة
        // ============================================
        window.changePerPage = function(value) {
            const search = document.getElementById('searchInput')?.value || '';
            const filter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
            const currentPage = 1;
            
            fetch(`{{ url_for('suppliers_product.my_products') }}?page=${currentPage}&filter=${filter}&search=${encodeURIComponent(search)}&per_page=${value}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newResults = doc.getElementById('results-container');
                if (newResults) {
                    resultsContainer.innerHTML = newResults.innerHTML;
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(err => console.error('Per page change error:', err));
        };

        // ============================================
        // ✅ تقليب البطاقة (Flip) عند النقر المزدوج
        // ============================================
        document.addEventListener('dblclick', function(e) {
            const card = e.target.closest('.product-card.flip-container');
            if (card) {
                card.classList.toggle('flipped');
            }
        });

        // ============================================
        // ✅ نسخ الرابط
        // ============================================
        window.copyProductLink = function(qid, event) {
            if (event) event.stopPropagation();
            const url = `{{ request.host_url }}products/${qid}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('✅ تم نسخ الرابط بنجاح!', 'success');
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        };

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
            showToast('✅ تم نسخ الرابط بنجاح!', 'success');
        }

        // ============================================
        // ✅ إضافة للمفضلة
        // ============================================
        window.toggleFavorite = function(qid, event) {
            if (event) event.stopPropagation();
            const btn = event?.target?.closest('.btn-action');
            const icon = btn?.querySelector('i');
            
            if (icon) {
                icon.classList.toggle('far');
                icon.classList.toggle('fas');
                icon.classList.toggle('text-danger');
                
                if (icon.classList.contains('fas')) {
                    showToast('❤️ تمت الإضافة للمفضلة', 'success');
                } else {
                    showToast('تمت الإزالة من المفضلة', 'info');
                }
            }
            
            console.log('Toggle favorite for product:', qid);
        };

        // ============================================
        // ✅ عرض Toast
        // ============================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#28a745',
                info: '#0d6efd',
                warning: '#ffc107',
                danger: '#dc3545'
            };
            
            const toast = document.createElement('div');
            toast.className = 'position-fixed bottom-0 end-0 p-3';
            toast.style.zIndex = '9999';
            toast.innerHTML = `
                <div class="toast show border-0 shadow-lg" role="alert" style="border-right: 4px solid ${colors[type] || colors.info}; background: white; border-radius: 12px;">
                    <div class="toast-body d-flex align-items-center gap-2">
                        <span>${message}</span>
                        <button type="button" class="btn-close btn-close-sm ms-2" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

    });
</script>
