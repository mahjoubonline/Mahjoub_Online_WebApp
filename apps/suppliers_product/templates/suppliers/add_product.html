<!-- apps/suppliers_product/templates/suppliers/add_product.html -->
{% extends "suppliers/base.html" %}

{% block title %}إضافة منتج | محجوب{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center mb-4">
        <div class="bg-white p-3 rounded-circle shadow-sm me-3" style="border: 2px solid var(--dark-purple, #2d0b36);">
            <i class="fas fa-plus-circle fa-2x" style="color: var(--dark-purple, #2d0b36);"></i>
        </div>
        <div>
            <h3 class="fw-bold text-dark mb-0">إضافة منتج جديد</h3>
            <p class="text-muted mb-0">📦 أضف منتجاً جديداً ليتم مراجعته</p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('add_product_bp.save_product') }}" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">اسم المنتج <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="أدخل اسم المنتج..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">سعر التكلفة (SAR) <span class="text-danger">*</span></label>
                            <input type="number" name="cost_price" class="form-control form-control-lg" placeholder="50.00" step="0.01" min="0" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">صورة المنتج <span class="text-danger">*</span></label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <small>سيتم مراجعة المنتج قبل النشر</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-custom px-5 py-2">
                                <i class="fas fa-save me-2"></i> إرسال للمراجعة
                            </button>
                            <a href="{{ url_for('suppliers_product_bp.products') }}" class="btn btn-outline-secondary px-4 py-2">
                                <i class="fas fa-arrow-right me-1"></i> رجوع
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-custom {
        background-color: var(--dark-purple, #2d0b36);
        color: #fff;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-custom:hover {
        background-color: #4a1558;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(45, 11, 54, 0.3);
    }
    .form-control:focus {
        border-color: var(--dark-purple, #2d0b36);
        box-shadow: 0 0 0 0.2rem rgba(45, 11, 54, 0.15);
    }
</style>
{% endblock %}
