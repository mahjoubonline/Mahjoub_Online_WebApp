<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول | محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gov-purple: #1a0b2e;
            --gov-gold: #D4AF37;
            --soft-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gov-purple) 0%, #2a114d 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .login-card h1 {
            color: var(--gov-gold);
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 900;
        }

        .login-card p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--gov-gold);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--gov-gold);
            background: rgba(255,255,255,0.2);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--gov-gold);
            color: var(--gov-purple);
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            opacity: 0.6;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--gov-gold);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-shield-halved fa-3x" style="color: var(--gov-gold); margin-bottom: 15px;"></i>
        <h1>محجوب أونلاين</h1>
        <p>بوابة الوصول السيادية</p>

        <form action="{{ url_for('auth_portal.login') }}" method="POST">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                تسجيل الدخول <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="footer-links">
            <a href="#">نسيت كلمة المرور؟</a>
        </div>
    </div>

</body>
</html>
