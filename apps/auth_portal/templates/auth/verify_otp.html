<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الهوية - الإدارة السيادية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle, #2a114d, #1a0b2e); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif; color: white; overflow: hidden;
        }
        .wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .card { 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(25px); 
            padding: 40px; border-radius: 30px; border: 1px solid #D4AF37; 
            width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .card h2 { font-size: 1.6rem; margin-bottom: 10px; color: #fff; }
        .input-otp { 
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #D4AF37; 
            background: transparent; color: white; text-align: center; 
            font-size: 1.6rem; letter-spacing: 8px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        .input-otp:focus { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .btn-verify { 
            width: 100%; padding: 15px; background: #D4AF37; border: none; 
            border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; 
            color: #1a0b2e; margin-bottom: 15px; transition: 0.3s; font-family: 'Cairo', sans-serif;
        }
        .btn-verify:hover { background: #fff; transform: translateY(-2px); }
        .resend-btn { 
            background: none; border: none; cursor: pointer; color: #a090b5; 
            font-size: 0.85rem; margin-top: 10px; transition: 0.3s; 
            font-family: 'Cairo', sans-serif; display: inline-flex; align-items: center; gap: 8px;
        }
        .resend-btn:hover:not(:disabled) { color: #D4AF37; }
        .resend-btn:disabled { color: #555; cursor: not-allowed; }
        .flash-message { 
            padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; 
            background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37; color: #fff;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h2>التحقق الأمني</h2>
            <p style="font-size: 0.9rem; margin-bottom: 25px; color: #ccc;">
                أدخل رمز التحقق (OTP) الذي تم إرساله إلى حساب الواتساب المرتبط بهويتك.
            </p>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth_portal.verify_otp_page') }}" method="POST" id="otp-form">
                <input type="text" name="otp_code" class="input-otp" maxlength="6" placeholder="******" required autocomplete="off" inputmode="numeric" pattern="[0-9]*">
                <button type="submit" class="btn-verify">تأكيد الدخول</button>
            </form>

            <form id="resend-form" action="{{ url_for('auth_portal.resend_otp') }}" method="POST">
                <button type="submit" id="resend-btn" class="resend-btn">
                    <i class="fas fa-redo"></i> <span id="resend-text">لم يصلك الرمز؟ أعد إرساله</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // منطق الإرسال التلقائي عند اكتمال الـ 6 أرقام
            const otpInput = document.querySelector('.input-otp');
            const otpForm = document.getElementById('otp-form');
            
            otpInput.addEventListener('input', function() {
                // التأكد من أن الإدخال رقمي فقط
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length === 6) {
                    this.style.borderColor = "#fff";
                    otpForm.submit();
                }
            });

            // منطق المؤقت (Timer) لإعادة الإرسال
            const resendBtn = document.getElementById('resend-btn');
            const resendText = document.getElementById('resend-text');
            let timeLeft = 60;

            function startTimer() {
                resendBtn.disabled = true;
                const timer = setInterval(() => {
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        resendBtn.disabled = false;
                        resendText.innerHTML = "لم يصلك الرمز؟ أعد إرساله";
                        timeLeft = 60;
                    } else {
                        resendText.innerHTML = `أعد إرساله بعد ${timeLeft} ثانية`;
                        timeLeft--;
                    }
                }, 1000);
            }
            startTimer();
        });
    </script>
</body>
</html>
