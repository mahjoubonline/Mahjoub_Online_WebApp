<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الهوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle, #2a114d, #1a0b2e); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Cairo', sans-serif; color: white; margin: 0; }
        .card { background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid #D4AF37; width: 350px; text-align: center; }
        .input-otp { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #D4AF37; background: transparent; color: white; text-align: center; font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 20px; box-sizing: border-box; }
        .btn-verify { width: 100%; padding: 15px; background: #D4AF37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #1a0b2e; margin-bottom: 15px; }
        .resend-link { color: #a090b5; font-size: 0.85rem; text-decoration: none; cursor: pointer; display: block; margin-top: 10px; }
        .resend-link:hover { color: #D4AF37; }
        .flash-message { padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; background: rgba(255, 0, 0, 0.2); border: 1px solid red; }
    </style>
</head>
<body>
    <div class="card">
        <h2>التحقق الأمني</h2>
        <p style="font-size: 0.9rem; margin-bottom: 25px;">أدخل رمز التحقق (OTP) المرسل لبريدك الإلكتروني.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for message in messages %}
                <div class="flash-message">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form action="{{ url_for('auth_portal.verify_otp_page') }}" method="POST">
            <input type="text" name="otp_code" class="input-otp" maxlength="6" placeholder="******" required autocomplete="off">
            <button type="submit" class="btn-verify">تأكيد الدخول</button>
        </form>

        <form action="{{ url_for('auth_portal.resend_otp') }}" method="POST">
            <button type="submit" style="background: none; border: none; cursor: pointer;" class="resend-link">
                <i class="fas fa-redo"></i> لم يصلك الرمز؟ أعد إرساله
            </button>
        </form>
    </div>
</body>
</html>
