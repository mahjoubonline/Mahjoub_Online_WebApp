<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الهوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle, #2a114d, #1a0b2e); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Cairo', sans-serif; color: white; }
        .card { background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid #D4AF37; width: 350px; text-align: center; }
        .input-otp { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #D4AF37; background: transparent; color: white; text-align: center; font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 20px; }
        .btn-verify { width: 100%; padding: 15px; background: #D4AF37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>التحقق الأمني</h2>
        <p>أدخل رمز التحقق (OTP) المرسل لوسيلة اتصالك.</p>
        <form action="{{ url_for('auth_portal.verify_otp_page') }}" method="POST">
            <input type="text" name="otp_code" class="input-otp" maxlength="6" placeholder="******" required>
            <button type="submit" class="btn-verify">تأكيد الدخول</button>
        </form>
    </div>
</body>
</html>
