<!-- 📂 apps/admin_Product/templates/admin/admin_add_product.html -->
{% extends "admin/admin_base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

<style>
    /* تحسينات الألوان والخطوط */
    :root { 
        --deep-purple: #2d144d; 
        --royal-accent: #6a1b9a; 
        --gold-accent: #d4af37;
        --royal-bg: #f4f2f7;
    }

    body { background-color: var(--royal-bg); }

    .card { 
        border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        padding: 25px; margin-bottom: 25px; background: #fff;
    }

    .section-title { 
        color: var(--deep-purple); font-weight: 800; border-right: 4px solid var(--royal-accent);
        padding-right: 15px; margin-bottom: 25px; font-size: 1.25rem;
    }

    /* تحسين منطقة الصور */
    .image-zone { 
        border: 2px dashed #b39ddb; padding: 40px; text-align: center; 
        cursor: pointer; border-radius: 15px; background: #f8f5fc; transition: 0.3s;
    }
    .image-zone:hover { border-color: var(--royal-accent); background: #ece7f5; }

    /* تحسين التنسيق العام */
    .form-control, .form-select { border-radius: 12px; border: 1px solid #d1c4e9; padding: 12px; }
    .btn-royal { background-color: var(--deep-purple); color: #fff; border-radius: 15px; padding: 12px 25px; }
    .btn-royal:hover { background-color: var(--royal-accent); color: #fff; }
</style>

<div class="container py-4" dir="rtl">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark"><i class="fas fa-plus-circle text-royal-accent"></i> إضافة منتج جديد</h3>
        <a href="{{ url_for('admin_product_bp.manage_products') }}" class="btn btn-outline-dark px-4 rounded-pill">
            <i class="fas fa-arrow-right ms-1"></i> العودة للقائمة
        </a>
    </div>

    <form id="addProductForm" onsubmit="saveNewProduct(event)">
        <div class="row">
            <!-- العمود الأيمن -->
            <div class="col-lg-8">
                <!-- الوصف والاسم -->
                <div class="card">
                    <h5 class="section-title">بيانات المنتج الأساسية</h5>
                    <div class="mb-4">
                        <label class="form-label fw-bold">اسم المنتج</label>
                        <input type="text" class="form-control form-control-lg" id="title" required placeholder="مثال: مطحنة قهوة احترافية...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">وصف المنتج</label>
                        <textarea id="editor"></textarea>
                    </div>
                </div>

                <!-- الصور -->
                <div class="card">
                    <h5 class="section-title">معرض الصور</h5>
                    <div class="image-zone mb-4" onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-images fa-3x mb-3" style="color: var(--royal-accent);"></i>
                        <p class="fw-bold">اضغط لرفع صور المنتج أو اسحبها هنا</p>
                    </div>
                    <input type="file" id="imageInput" class="d-none" multiple accept="image/*" onchange="previewImages(this)">
                    <div class="row g-3" id="imageGallery"></div>
                </div>

                <!-- الأسعار والمتغيرات -->
                <div class="card">
                    <h5 class="section-title">الأسعار والمخزون</h5>
                    <!-- هنا نضع حقول السعر والجدول -->
                    <!-- (نفس الجدول الخاص بك لكن بتنسيق Padding أفضل) -->
                </div>
            </div>

            <!-- العمود الأيسر (الإعدادات) -->
            <div class="col-lg-4">
                <div class="card sticky-top" style="top: 20px;">
                    <h5 class="section-title">إعدادات النشر</h5>
                    <!-- التصنيفات والمورد وحالة النشر -->
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-royal w-100 py-3 fs-4 shadow-lg">حفظ المنتج وإطلاقه</button>
    </form>
</div>

<script>
    // تهيئة المحرر
    ClassicEditor.create(document.querySelector('#editor'), { language: 'ar' });
    
    // ملاحظة: تأكد من تشغيل دالة saveNewProduct وتحديثها بالـ API الذي اتفقنا عليه
    // يمكنك إضافة منطق لجلب الـ qid بعد الحفظ وتخزينه في جدولك الخاص.
</script>
{% endblock %}
