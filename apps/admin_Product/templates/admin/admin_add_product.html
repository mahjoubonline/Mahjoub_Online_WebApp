{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom p-3">
                    <h4 class="mb-0 text-primary">
                        <i class="fas fa-plus-circle me-2"></i> إضافة منتج جديد
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin_product_bp.add_product') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">اسم المنتج</label>
                            <input type="text" name="title" class="form-control" required placeholder="أدخل اسم المنتج...">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">سعر التكلفة</label>
                                <input type="number" step="0.01" name="cost_price" class="form-control" required placeholder="0.00">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">الكمية</label>
                                <input type="number" name="quantity" class="form-control" required placeholder="العدد المتوفر...">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">رمز المنتج (SKU)</label>
                            <input type="text" name="sku" class="form-control" placeholder="اختياري...">
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" onclick="history.back()" class="btn btn-outline-secondary">إلغاء</button>
                            <button type="submit" class="btn btn-mahjoub-gold px-4">حفظ المنتج</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
