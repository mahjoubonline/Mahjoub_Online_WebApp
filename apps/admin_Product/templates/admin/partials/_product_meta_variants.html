<!-- القسم الرابع: متغيرات المنتج (Variants) -->
<div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-[var(--royal-purple-light)]">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 border-b pb-3 border-[var(--royal-purple-light)]">
        <h2 class="text-lg font-bold text-[var(--royal-midnight-900)] flex items-center gap-2">
            <i class="fa-solid fa-boxes-stacked text-[var(--royal-purple-accent)]"></i> متغيرات المنتج (Variants)
        </h2>
        <button type="button" id="addVariantBtn" class="bg-[var(--royal-midnight-800)] hover:bg-[var(--royal-midnight-900)] text-white text-sm px-4 py-2 rounded-xl font-semibold transition flex items-center gap-1 cursor-pointer shadow-xs">
            <i class="fa-solid fa-plus"></i> إضافة متغير جديد
        </button>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse min-w-[600px]">
            <thead>
                <tr class="bg-[var(--royal-midnight-800)]/5 text-gray-700 text-sm">
                    <th class="p-3 border-b">اسم المتغير (مثل: لون أحمر، أخضر، L)</th>
                    <th class="p-3 border-b">السعر</th>
                    <th class="p-3 border-b">الكمية</th>
                    <th class="p-3 border-b">SKU</th>
                    <th class="p-3 border-b text-center">حذف</th>
                </tr>
            </thead>
            <tbody id="variantsTableBody" class="text-sm">
                {% if product.variants %}
                    {% for var in product.variants %}
                    <tr>
                        <td class="p-2 border-b"><input type="text" name="variant_name[]" value="{{ var.name if var.name else '' }}" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="مثال: أحمر / أخضر / أزرق / أسود"></td>
                        <td class="p-2 border-b"><input type="number" step="0.01" name="variant_price[]" value="{{ var.pricing.price if var.pricing and var.pricing.price is defined else (var.price if var.price is defined else 0) }}" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="0.00"></td>
                        <td class="p-2 border-b"><input type="number" name="variant_qty[]" value="{{ var.quantity if var.quantity is defined else 0 }}" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="0"></td>
                        <td class="p-2 border-b"><input type="text" name="variant_sku[]" value="{{ var.sku if var.sku else '' }}" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="SKU-VAR"></td>
                        <td class="p-2 border-b text-center">
                            <button type="button" class="text-red-500 hover:text-red-700 remove-variant p-2 cursor-pointer"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td class="p-2 border-b"><input type="text" name="variant_name[]" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="مثال: أحمر / أخضر / أزرق / أسود"></td>
                        <td class="p-2 border-b"><input type="number" step="0.01" name="variant_price[]" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="0.00"></td>
                        <td class="p-2 border-b"><input type="number" name="variant_qty[]" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="0"></td>
                        <td class="p-2 border-b"><input type="text" name="variant_sku[]" class="w-full px-3 py-1.5 border rounded-xl royal-focus outline-none transition" placeholder="SKU-VAR"></td>
                        <td class="p-2 border-b text-center">
                            <button type="button" class="text-red-500 hover:text-red-700 remove-variant p-2 cursor-pointer"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>
