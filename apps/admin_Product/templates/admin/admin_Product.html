{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    :root { --dark-purple: #2d0b36; }
    .btn-custom { background-color: var(--dark-purple); color: #fff; border: none; }
    .btn-custom:hover { background-color: #1a0620; color: #eee; }
    .text-custom { color: var(--dark-purple); }
</style>

<div class="container-fluid">
    <!-- الرأس: العنوان وأزرار الإجراءات -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">قائمة المنتجات</h3>
        
        <form action="{{ url_for('admin_product_bp.manage_products') }}" method="GET" class="d-flex flex-grow-1 mx-3">
            <input type="text" name="search" id="searchInput" class="form-control" placeholder="ابحث باسم المنتج (البحث تلقائي)..." value="{{ search }}">
        </form>

        <div class="d-flex gap-2">
            <a href="{{ url_for('admin_product_bp.add_product') }}" class="btn btn-success">
                <i class="fas fa-plus"></i> إضافة
            </a>
            <button type="button" class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#syncModal">
                <i class="fas fa-sync-alt"></i> مزامنة
            </button>
        </div>
    </div>

    <!-- إحصائيات -->
    <div class="text-center mb-4 text-muted">
        إجمالي المنتجات: <strong>{{ pagination.total }}</strong> | 
        الصفحة <strong>{{ pagination.page }}</strong> من <strong>{{ pagination.pages }}</strong>
    </div>

    <!-- استدعاء الجدول التفصيلي -->
    {% include 'admin/includes/_table_products.html' %}

</div>

<script>
    // تفعيل البحث التلقائي عند الكتابة
    let searchTimeout;
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            this.form.submit();
        }, 600);
    });
</script>

{% include 'admin/includes/_sync_modal.html' %}
{% endblock %}
