{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    :root { --dark-purple: #2d0b36; }
    .btn-custom { background-color: var(--dark-purple); color: #fff; border: none; }
    .btn-custom:hover { background-color: #1a0620; color: #eee; }
    .text-custom { color: var(--dark-purple); }
    /* تنسيق أزرار التنقل */
    .pagination .page-link { color: var(--dark-purple); border-color: #dee2e6; }
    .pagination .page-item.active .page-link { background-color: var(--dark-purple); border-color: var(--dark-purple); color: #fff; }
</style>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <button onclick="history.back()" class="btn btn-outline-dark"><i class="fas fa-arrow-right"></i> رجوع</button>
        <form id="searchForm" class="d-flex flex-grow-1 mx-3">
            <input type="text" id="searchInput" class="form-control" placeholder="ابحث باسم المنتج أو الـ SKU...">
        </form>
        <button type="button" class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#syncModal">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <!-- شبكة المنتجات -->
    <div class="row row-cols-1 row-cols-md-5 g-4" id="productGrid">
        <div class="col-12 text-center py-5" id="loadingIndicator">
            <div class="spinner-border text-custom" role="status"></div>
            <p class="mt-2">جاري جلب المنتجات...</p>
        </div>
    </div>

    <!-- منطقة أزرار التنقل -->
    <nav class="mt-5">
        <ul class="pagination justify-content-center" id="pagination">
            <!-- سيتم إنشاء الأزرار هنا بواسطة JS -->
        </ul>
    </nav>
</div>

<script>
    let currentPage = 1;

    async function loadProducts(page = 1) {
        currentPage = page;
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-custom"></div></div>';

        try {
            const response = await fetch(`/admin/products/get-products?page=${page}`);
            const data = await response.json();
            
            grid.innerHTML = '';
            if (!data.products || data.products.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">لا توجد منتجات.</div>';
                return;
            }

            data.products.forEach(product => {
                const img = (product.images && product.images.length > 0) ? product.images[0].fileUrl : '/static/images/default.png';
                grid.insertAdjacentHTML('beforeend', `
                    <div class="col product-item">
                        <div class="card h-100 shadow-sm border-0 rounded-3">
                            <div class="bg-light text-center" style="height: 160px; overflow: hidden;">
                                <img src="${img}" class="w-100 h-100" style="object-fit: cover;" alt="${product.title}">
                            </div>
                            <div class="card-body p-3">
                                <h6 class="card-title fw-bold text-truncate">${product.title}</h6>
                                <div class="d-flex justify-content-between small text-muted">
                                    <span>الكمية: ${product.quantity || 0}</span>
                                    <span class="text-custom fw-bold">${product.pricing.price || 0} ر.س</span>
                                </div>
                            </div>
                        </div>
                    </div>`);
            });

            // إنشاء أزرار التنقل
            renderPagination(data.pages);
        } catch (e) {
            grid.innerHTML = '<p class="text-danger text-center">حدث خطأ في تحميل البيانات.</p>';
        }
    }

    function renderPagination(totalPages) {
        const pag = document.getElementById('pagination');
        let html = `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="event.preventDefault(); loadProducts(${currentPage - 1})">السابق</a>
            </li>
            <li class="page-item active"><a class="page-link">${currentPage} من ${totalPages}</a></li>
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="event.preventDefault(); loadProducts(${currentPage + 1})">التالي</a>
            </li>`;
        pag.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => loadProducts(1));
</script>

{% include 'admin/includes/_sync_modal.html' %}
{% endblock %}
