<div class="modal fade" id="syncModal" tabindex="-1" aria-labelledby="syncModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="syncModalLabel">تحديث قائمة المنتجات</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="sync-progress-area" class="d-none">
                    <div class="progress mb-3">
                        <div id="sync-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p id="sync-status" class="text-center small">جاري التحديث...</p>
                </div>
                <div id="sync-info">
                    <p>سيتم جلب أحدث المنتجات مباشرة من "قمرة". هل تريد تحديث القائمة الآن؟</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                <button type="button" id="startSyncBtn" class="btn btn-primary" onclick="startProductSync()">تحديث البيانات الآن</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function startProductSync() {
        const btn = document.getElementById('startSyncBtn');
        const progressBar = document.getElementById('sync-bar');
        const statusText = document.getElementById('sync-status');
        
        btn.disabled = true;
        document.getElementById('sync-info').classList.add('d-none');
        document.getElementById('sync-progress-area').classList.remove('d-none');
        
        progressBar.style.width = '30%';
        statusText.innerText = "جاري الاتصال بالسيرفر لبدء المزامنة...";

        try {
            // جلب الـ CSRF Token من الميتا تاغ في الصفحة
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            
            const response = await fetch('/admin/products/proxy-sync', { 
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken || ''
                }
            });

            if (!response.ok) throw new Error('فشل الاتصال');
            
            const data = await response.json();
            
            progressBar.style.width = '100%';
            statusText.innerHTML = `<span class="text-success">${data.message}</span>`;
            
            setTimeout(() => {
                const modalElement = document.getElementById('syncModal');
                const modal = bootstrap.Modal.getInstance(modalElement);
                if (modal) modal.hide();
                window.location.reload(); 
            }, 1000);
            
        } catch (err) {
            statusText.innerHTML = `<span class="text-danger">خطأ: تأكد من الصلاحيات أو اتصال السيرفر.</span>`;
            btn.disabled = false;
        }
    }
</script>
