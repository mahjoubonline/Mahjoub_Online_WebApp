<div class="modal fade" id="syncModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">مزامنة المنتجات</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="sync-progress-area" class="d-none">
                    <div class="progress mb-3">
                        <div id="sync-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p id="sync-status" class="text-center small text-muted">جاري البدء...</p>
                </div>
                <p id="sync-info">سيتم جلب المنتجات وتحديث قاعدة البيانات المحلية. هل أنت متأكد؟</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                <button type="button" id="startSyncBtn" class="btn btn-primary" onclick="startProductSync()">بدء المزامنة</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function startProductSync() {
        const btn = document.getElementById('startSyncBtn');
        const progressArea = document.getElementById('sync-progress-area');
        const progressBar = document.getElementById('sync-bar');
        const statusText = document.getElementById('sync-status');
        
        btn.disabled = true;
        progressArea.classList.remove('d-none');
        progressBar.style.width = '30%';
        statusText.innerText = "جاري الجلب عبر السيرفر...";
        
        try {
            // 1. الجلب عبر الوكيل المحلي (Proxy)
            const response = await fetch("{{ url_for('admin_product_bp.proxy_sync') }}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': "{{ csrf_token() }}" 
                }
            });

            if (!response.ok) throw new Error("فشل الاتصال بالخادم المحلي");

            const result = await response.json();
            const products = result.data?.findAllProducts?.items;

            if (!products || products.length === 0) throw new Error("لم يتم العثور على منتجات");

            // 2. تحديث شريط التقدم
            progressBar.style.width = '60%';
            statusText.innerText = `تم جلب ${products.length} منتج، جاري الحفظ...`;

            // 3. الحفظ في قاعدة البيانات المحلية
            const saveResponse = await fetch("{{ url_for('admin_product_bp.save_sync') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': "{{ csrf_token() }}"
                },
                body: JSON.stringify({ products: products })
            });

            const saveResult = await saveResponse.json();
            
            if (saveResponse.ok && saveResult.status === 'success') {
                progressBar.style.width = '100%';
                statusText.innerText = "تمت المزامنة بنجاح!";
                alert(saveResult.message);
                location.reload();
            } else {
                throw new Error(saveResult.message);
            }
            
        } catch (err) {
            console.error(err);
            statusText.innerText = "حدث خطأ: " + err.message;
            statusText.classList.add('text-danger');
            alert('خطأ: ' + err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
