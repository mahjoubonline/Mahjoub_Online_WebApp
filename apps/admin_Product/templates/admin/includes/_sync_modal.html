<!-- 📂 apps/admin_Product/templates/admin/includes/_sync_modal.html -->
<div class="modal fade" id="syncModal" tabindex="-1" aria-labelledby="syncModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pt-4 pb-0" style="background: transparent;">
                <h5 class="modal-title fw-bold" id="syncModalLabel" style="color: var(--dark-purple, #2d0b36);">
                    <i class="fas fa-sync-alt me-2 text-warning" style="color: var(--mahjoub-gold, #D4AF37) !important;"></i> 
                    مزامنة المنتجات
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-4 pb-2">
                <div class="text-center mb-3">
                    <i class="fas fa-cloud-upload-alt fa-3x text-muted" style="opacity: 0.3;"></i>
                </div>
                <p class="text-muted text-center">
                    سيتم الآن جلب أحدث المنتجات وتحديث المخزون والبيانات عبر الاتصال السحابي.
                </p>
                <div class="alert alert-info border-0 rounded-3 py-2">
                    <i class="fas fa-info-circle me-2"></i>
                    <small>سيتم جلب جميع المنتجات من قمرة وتحديث البيانات في النظام.</small>
                </div>
            </div>
            <div class="modal-footer border-0 pb-4 pt-0">
                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" data-bs-dismiss="modal">
                    <i class="fas fa-times me-1"></i> إلغاء
                </button>
                <form action="{{ url_for('admin_product_bp.sync_products') }}" method="POST" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-custom px-4 rounded-pill" id="syncConfirmBtn">
                        <i class="fas fa-cloud-download-alt me-1"></i> بدء المزامنة الآن
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-custom {
        background: linear-gradient(135deg, var(--dark-purple, #2d0b36) 0%, #4a1558 100%);
        color: #fff;
        border: none;
        transition: all 0.3s ease;
        font-weight: 600;
    }
    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(45, 11, 54, 0.3);
        color: #fff;
    }
    .btn-custom:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .modal-content {
        border: 1px solid rgba(212, 175, 55, 0.15);
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const syncForm = document.querySelector('#syncModal form');
        const syncBtn = document.getElementById('syncConfirmBtn');
        
        if (syncForm) {
            syncForm.addEventListener('submit', function(e) {
                if (syncBtn) {
                    syncBtn.disabled = true;
                    syncBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري المزامنة...';
                }
            });
        }
        
        // ✅ إعادة تمكين الزر عند إغلاق المودال
        const syncModal = document.getElementById('syncModal');
        if (syncModal) {
            syncModal.addEventListener('hidden.bs.modal', function() {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = '<i class="fas fa-cloud-download-alt me-1"></i> بدء المزامنة الآن';
                }
            });
        }
    });
</script>
