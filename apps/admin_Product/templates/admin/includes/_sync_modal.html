<div class="modal fade" id="syncModal" tabindex="-1" aria-labelledby="syncModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="syncModalLabel">تحديث قائمة المنتجات</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="sync-progress-area" class="d-none">
                    <div class="progress mb-3">
                        <div id="sync-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p id="sync-status" class="text-center small">جاري التحديث...</p>
                </div>
                <div id="sync-info">
                    <p>سيتم جلب أحدث المنتجات مباشرة من "قمرة". هل تريد تحديث القائمة الآن؟</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                <button type="button" id="startSyncBtn" class="btn btn-primary" onclick="startProductSync()">تحديث البيانات الآن</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function startProductSync() {
        const btn = document.getElementById('startSyncBtn');
        const progressBar = document.getElementById('sync-bar');
        const statusText = document.getElementById('sync-status');
        const grid = document.getElementById('productGrid');
        
        btn.disabled = true;
        document.getElementById('sync-info').classList.add('d-none');
        document.getElementById('sync-progress-area').classList.remove('d-none');
        
        progressBar.style.width = '50%';
        statusText.innerText = "جاري جلب البيانات المحدثة...";

        try {
            // محاكاة عملية التحديث
            progressBar.style.width = '100%';
            statusText.innerHTML = `<span class="text-success">تم جلب البيانات بنجاح!</span>`;
            
            // إغلاق المودال بعد ثانية
            setTimeout(() => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('syncModal'));
                modal.hide();
                
                // إعادة تحميل المنتجات في الصفحة الحالية دون عمل Reload للصفحة
                grid.innerHTML = '<div class="col-12 text-center py-5" id="loadingIndicator"><div class="spinner-border text-custom" role="status"></div><p class="mt-2">جاري تحديث القائمة...</p></div>';
                loadProducts(); 
                
                // إعادة ضبط المودال للحالة الأصلية
                btn.disabled = false;
                document.getElementById('sync-info').classList.remove('d-none');
                document.getElementById('sync-progress-area').classList.add('d-none');
                progressBar.style.width = '0%';
            }, 1000);
            
        } catch (err) {
            statusText.innerHTML = `<span class="text-danger">خطأ في التحديث: ${err.message}</span>`;
            btn.disabled = false;
        }
    }
</script>
