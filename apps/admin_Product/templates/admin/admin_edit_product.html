<!-- 📂 apps/admin_Product/templates/admin/admin_edit_product.html -->
{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fas fa-edit me-2"></i>تعديل المنتج: {{ product.title or 'منتج جديد' }}</h4>
        <a href="{{ url_for('admin_product_bp.manage_products') }}" class="btn btn-outline-secondary">العودة للمنتجات</a>
    </div>
    
    <form id="editProductForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="qid" value="{{ product.qid }}">

        <div class="row">
            <!-- 1. البيانات الأساسية -->
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>البيانات الأساسية</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label>اسم المنتج</label><input type="text" class="form-control" id="title" value="{{ product.title or '' }}"></div>
                            <div class="col-md-6 mb-3"><label>الرابط (Slug)</label><input type="text" class="form-control" id="slug" value="{{ product.slug or '' }}"></div>
                            <div class="col-md-6 mb-3"><label>المورد</label>
                                <select class="form-select" id="supplier_id">
                                    <option value="">-- اختر مورد --</option>
                                    {% for s in suppliers %}
                                    <option value="{{ s.id }}" {% if selected_supplier_id == s.id %}selected{% endif %}>{{ s.trade_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3 mb-3"><label>الحالة</label><input type="text" class="form-control" id="status" value="{{ product.status or 'draft' }}" readonly></div>
                        </div>
                    </div>
                </div>

                <!-- 2. التسعير والمخزون -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>التسعير والمخزون</h5>
                        <div class="row">
                            <div class="col-md-4 mb-3"><label>السعر</label><input type="number" class="form-control" id="price" value="{{ product.pricing.price if product.pricing else 0 }}"></div>
                            <div class="col-md-4 mb-3"><label>الكمية</label><input type="number" class="form-control" id="quantity" value="{{ product.quantity or 0 }}"></div>
                            <div class="col-md-4 mb-3"><label>SKU</label><input type="text" class="form-control" id="sku" value="{{ product.identification.sku if product.identification else '' }}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. الصور والأبعاد -->
            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>صور المنتج</h5>
                        <div class="row g-2">
                            {% for img in product.images or [] %}
                                <div class="col-6"><img src="{{ img.fileUrl }}" class="img-thumbnail w-100"></div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>ملاحظات إدارية (خاص)</h5>
                        <textarea class="form-control" id="internal_notes" rows="3">{{ internal_notes or '' }}</textarea>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" id="saveBtn" class="btn btn-primary btn-lg w-100">حفظ كافة التعديلات</button>
    </form>
</div>

<script>
async function saveProduct(event) {
    event.preventDefault();
    const data = {
        qid: document.getElementById('qid').value,
        supplier_id: document.getElementById('supplier_id').value,
        internal_notes: document.getElementById('internal_notes').value,
        // يمكن إضافة بقية الحقول لاحقاً
    };
    console.log("Data to update:", data);
    // هنا سيتم ربط Fetch API لاحقاً
    alert("تم تجميع البيانات (سيتم الربط مع الـ Backend في الخطوة التالية).");
}
</script>
{% endblock %}
