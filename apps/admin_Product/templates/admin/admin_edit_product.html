<!-- 📂 apps/admin_Product/templates/admin/admin_edit_product.html -->
{% extends "admin/base.html" %}

{% block content %}
<style>
    :root { --dark-purple: #2d0b36; }
    .card { border-radius: 15px; }
    .btn-custom { background-color: var(--dark-purple); color: white; }
    .btn-custom:hover { background-color: #4a1555; color: white; }
    .form-label { font-weight: 600; color: var(--dark-purple); }
</style>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <h4 class="mb-4 text-custom fw-bold">تعديل المنتج: {{ product.title }}</h4>
                
                <form id="editProductForm" onsubmit="saveProduct(event)">
                    <!-- حقل مخفي للمعالج -->
                    <input type="hidden" id="qid" value="{{ product.qid }}">

                    <div class="row">
                        <!-- اسم المنتج -->
                        <div class="col-md-12 mb-3">
                            <label class="form-label">اسم المنتج</label>
                            <input type="text" class="form-control" id="title" value="{{ product.title }}">
                        </div>

                        <!-- السعر والكمية -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">السعر</label>
                            <input type="number" class="form-control" id="price" value="{{ product.pricing.price if product.pricing else 0 }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">الكمية</label>
                            <input type="number" class="form-control" id="quantity" value="{{ product.quantity or 0 }}">
                        </div>

                        <!-- SKU -->
                        <div class="col-md-12 mb-3">
                            <label class="form-label">رمز المنتج (SKU)</label>
                            <input type="text" class="form-control" id="sku" value="{{ product.identification.sku if product.identification else '' }}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="{{ url_for('admin_product_bp.manage_products') }}" class="btn btn-outline-secondary me-2">إلغاء</a>
                        <button type="submit" class="btn btn-custom px-4">حفظ التغييرات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
async function saveProduct(event) {
    event.preventDefault();
    
    const data = {
        qid: document.getElementById('qid').value,
        title: document.getElementById('title').value,
        price: parseFloat(document.getElementById('price').value),
        quantity: parseInt(document.getElementById('quantity').value),
        sku: document.getElementById('sku').value
    };

    const response = await fetch('/admin/products/save-sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("تم الحفظ بنجاح!");
        window.location.reload();
    } else {
        alert("حدث خطأ أثناء الحفظ.");
    }
}
</script>
{% endblock %}
