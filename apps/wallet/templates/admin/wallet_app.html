{% extends 'admin/admin_base.html' %}

{% block title %}إدارة محافظ الموردين{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-4">محافظ الموردين</h2>

    <div class="card shadow-sm border-0 p-3 mb-4">
        <input type="text" id="liveSearch" class="form-control" placeholder="البحث بالاسم أو رقم المحفظة...">
    </div>

    <div id="tableContainer" class="table-responsive">
        {% include 'admin/wallet_table_partial.html' %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    let timer;

    // وظيفة البحث مع تأخير (Debounce) لتقليل الضغط على السيرفر
    $('#liveSearch').on('keyup', function() {
        clearTimeout(timer);
        let query = $(this).val();
        timer = setTimeout(function() {
            $.ajax({
                url: "{{ url_for('wallet_app.dashboard') }}",
                data: { 'search': query },
                success: function(response) {
                    $('#tableContainer').html(response);
                }
            });
        }, 400); // ينتظر 400ms بعد التوقف عن الكتابة
    });

    // دعم التنقل بين الصفحات (Pagination)
    $(document).on('click', '.pagination a', function(e) {
        e.preventDefault();
        let url = $(this).attr('href');
        $.ajax({
            url: url,
            success: function(response) {
                $('#tableContainer').html(response);
            }
        });
    });
});
</script>
{% endblock %}
