{% extends 'admin/admin_base.html' %}

{% block title %}إدارة محافظ الموردين | محجوب أونلاين{% endblock %}

{% block content %}
<meta name="robots" content="noindex, nofollow, noarchive">

<div class="container-fluid py-4" id="mainWrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">إدارة محافظ الموردين</h2>
        <a href="#" class="btn btn-primary"><i class="fas fa-file-export me-2"></i> تصدير التقرير</a>
    </div>

    <div class="card mb-4 p-3 shadow-sm border-0">
        <div class="input-group">
            <span class="input-group-text bg-white border-0"><i class="fas fa-search"></i></span>
            <input type="text" id="liveSearch" class="form-control border-0" 
                   placeholder="ابحث بالاسم التجاري، أو رقم المحفظة..." autocomplete="off">
        </div>
    </div>

    <div id="tableContainer">
        {% include 'admin/wallet_table_partial.html' %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    let timer;
    
    // وظيفة البحث
    $(document).on('keyup', '#liveSearch', function() {
        clearTimeout(timer);
        let query = $(this).val();
        timer = setTimeout(function() {
            $.ajax({
                url: "{{ url_for('wallet_app.dashboard') }}",
                data: { 'search': query },
                success: function(response) {
                    $('#tableContainer').html(response);
                }
            });
        }, 400);
    });

    // دعم التنقل بين الصفحات (Pagination)
    $(document).on('click', '.pagination a', function(e) {
        e.preventDefault();
        let url = $(this).attr('href');
        $.ajax({
            url: url,
            success: function(response) {
                $('#tableContainer').html(response);
            }
        });
    });
});
</script>
{% endblock %}
