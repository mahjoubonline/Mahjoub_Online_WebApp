{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    /* تعريف ألوان الهوية */
    :root {
        --mahjoub-purple: #2d1b4e;
        --mahjoub-gold: #c5a059;
        --mahjoub-green: #27ae60;
        --mahjoub-orange: #e67e22;
        --mahjoub-cream: #f4ece0;
    }

    .stat-box {
        border-radius: 20px;
        padding: 25px;
        color: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        transition: 0.3s;
    }

    .stat-box:hover { transform: translateY(-5px); }

    /* توزيع الألوان المخصص */
    .bg-purple { background-color: var(--mahjoub-purple); }
    .bg-green { background-color: var(--mahjoub-green); }
    .bg-orange { background-color: var(--mahjoub-orange); }

    .stat-box small { color: #f0f0f0; font-weight: 500; display: block; margin-bottom: 5px; }
    .stat-box h3 { color: var(--mahjoub-gold); margin: 0; }

    .mahjoub-card { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: #fff; padding: 20px; }
    .btn-mahjoub { background-color: var(--mahjoub-purple) !important; color: white !important; }
    .btn-mahjoub:hover { background-color: var(--mahjoub-gold) !important; }
</style>

<div class="container-fluid py-4">
    <!-- صف البطاقات الملون -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-box bg-purple">
                <small>إجمالي أرصدة النظام (SAR)</small>
                <h3 class="fw-bold">{{ total_system_sar }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box bg-green">
                <small>إجمالي أرصدة النظام (YER)</small>
                <h3 class="fw-bold">{{ total_system_yer }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box bg-orange">
                <small>إجمالي أرصدة النظام (USD)</small>
                <h3 class="fw-bold">{{ total_system_usd }}</h3>
            </div>
        </div>
    </div>

    <div class="mahjoub-card">
        <h5 class="mb-3" style="color: var(--mahjoub-purple);"><i class="fas fa-search"></i> بحث ذكي في الموردين</h5>
        <div class="input-group input-group-lg">
            <select id="supplierSearch" class="form-control"></select>
            <button class="btn btn-mahjoub px-4" onclick="loadWallet()">عرض المحفظة</button>
        </div>
    </div>

    <div id="walletDisplayArea" class="mt-4">
        <div class="mahjoub-card text-center py-5 text-muted">
            <i class="fas fa-wallet fa-4x mb-3" style="color: var(--mahjoub-gold);"></i>
            <h5>يرجى تحديد مورد لعرض كشف الحساب</h5>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#supplierSearch').select2({
            placeholder: "ابحث عن المورد بالاسم أو رقم الهاتف...",
            ajax: { url: '/api/search_suppliers', dataType: 'json', delay: 250, data: params => ({ q: params.term }), processResults: data => ({ results: data }) }
        });
    });

    function loadWallet(page = 1) {
        let supplierId = $('#supplierSearch').val();
        if(!supplierId) return alert('يرجى اختيار مورد أولاً');
        
        fetch(`/wallet/view/${supplierId}?page=${page}`)
        .then(r => r.text())
        .then(html => {
            document.getElementById('walletDisplayArea').innerHTML = html;
        });
    }
</script>
{% endblock %}
