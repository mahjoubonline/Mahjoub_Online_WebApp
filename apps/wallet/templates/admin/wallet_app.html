{% extends 'admin/admin_base.html' %}

{% block title %}إدارة محافظ الموردين{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">محافظ الموردين</h2>
    </div>

    <div class="card shadow-sm border-0 p-3 mb-4">
        <div class="input-group">
            <span class="input-group-text bg-transparent border-0"><i class="fas fa-search"></i></span>
            <input type="text" id="liveSearch" class="form-control border-0" placeholder="البحث بالاسم التجاري، رقم المحفظة، أو الهاتف...">
        </div>
    </div>

    <div id="tableContainer" class="table-responsive">
        {% include 'admin/partials/wallet_table_body.html' %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    let timer;

    // وظيفة البحث المباشر (Live Search) مع مؤقت لتقليل الطلبات على السيرفر
    $('#liveSearch').on('keyup', function() {
        clearTimeout(timer);
        let query = $(this).val();
        timer = setTimeout(function() {
            $.ajax({
                url: "{{ url_for('wallet_app.dashboard') }}",
                data: { 'search': query },
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                success: function(response) {
                    $('#tableContainer').html(response);
                },
                error: function() {
                    console.error("حدث خطأ أثناء البحث.");
                }
            });
        }, 400);
    });

    // معالجة التنقل بين الصفحات (Pagination) برمجياً عبر AJAX
    $(document).on('click', '.pagination a', function(e) {
        e.preventDefault();
        let url = $(this).attr('href');
        
        $.ajax({
            url: url,
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(response) {
                $('#tableContainer').html(response);
            },
            error: function() {
                console.error("حدث خطأ أثناء تحميل الصفحة.");
            }
        });
    });
});
</script>
{% endblock %}
