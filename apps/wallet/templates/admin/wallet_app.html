{% extends 'admin/admin_base.html' %}

{% block title %}إدارة محافظ الموردين{% endblock %}

{% block content %}
<style>
    :root {
        --royal-purple: #2e003e; 
        --royal-gold: #d4af37;
    }
    .text-royal-purple { color: var(--royal-purple) !important; }
    
    .btn-royal-back {
        background-color: transparent;
        border: 2px solid var(--royal-purple);
        color: var(--royal-purple);
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-royal-back:hover {
        background-color: var(--royal-purple);
        color: #fff;
        border-color: var(--royal-purple);
    }
    .search-card { 
        border-right: 5px solid var(--royal-gold) !important; 
        background-color: #fcfcfc;
    }
</style>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-royal-purple"><i class="fas fa-wallet me-2"></i>محافظ الموردين</h2>
            <p class="text-muted">نظرة عامة على أرصدة الموردين وحركات التسوية</p>
        </div>
        
        <a href="/admin/dashboard" class="btn btn-royal-back px-4">
            <i class="fas fa-arrow-left me-2"></i>العودة للقيادة المركزية
        </a>
    </div>

    <div class="card shadow-sm border-0 mb-4 search-card">
        <div class="card-body p-2">
            <div class="input-group">
                <span class="input-group-text bg-white border-0"><i class="fas fa-search text-royal-purple"></i></span>
                <input type="text" id="liveSearch" class="form-control border-0" 
                       placeholder="البحث بالاسم التجاري، كود المحفظة...">
            </div>
        </div>
    </div>

    <div id="tableContainer" class="table-responsive shadow-sm bg-white rounded">
        {% include 'admin/partials/wallet_table_body.html' %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    let timer;

    $('#liveSearch').on('keyup', function() {
        clearTimeout(timer);
        let query = $(this).val();
        timer = setTimeout(function() {
            $('#tableContainer').css('opacity', '0.5');
            $.ajax({
                url: "{{ url_for('wallet_app.dashboard') }}",
                data: { 'search': query },
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                success: function(response) {
                    $('#tableContainer').html(response).css('opacity', '1');
                },
                error: function() {
                    $('#tableContainer').css('opacity', '1');
                    alert("تعذر الاتصال بالسيرفر.");
                }
            });
        }, 500);
    });

    $(document).on('click', '.pagination a', function(e) {
        e.preventDefault();
        let url = $(this).attr('href');
        $('#tableContainer').css('opacity', '0.5');
        $.ajax({
            url: url,
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(response) {
                $('#tableContainer').html(response).css('opacity', '1');
                window.scrollTo({top: $('#tableContainer').offset().top - 100, behavior: 'smooth'});
            }
        });
    });
});
</script>
{% endblock %}
