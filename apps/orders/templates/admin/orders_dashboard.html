{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="fw-bold text-dark"><i class="fas fa-shopping-cart text-primary me-2"></i> إدارة الطلبات</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb small">
                    <li class="breadcrumb-item"><a href="#">الرئيسية</a></li>
                    <li class="breadcrumb-item active" aria-current="page">سجل الطلبات</li>
                </ol>
            </nav>
        </div>
        <button class="btn btn-primary btn-sm" onclick="loadOrders()">
            <i class="fas fa-sync-alt me-1"></i> تحديث البيانات
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">رقم الطلب</th>
                            <th>العميل</th>
                            <th>التاريخ</th>
                            <th>الحالة</th>
                            <th>الإجمالي</th>
                            <th class="text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr>
                            <td colspan="6" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="text-muted mt-2">جاري جلب الطلبات...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
async function loadOrders() {
    const tbody = document.getElementById('ordersTableBody');
    
    try {
        // تأكد أن هذا الرابط يطابق المسار المعرف في ملف routes.py
        const res = await fetch('/bridge/api/orders');
        const data = await res.json();
        
        if (data.status === 'success' && data.orders.length > 0) {
            tbody.innerHTML = data.orders.map(o => `
                <tr>
                    <td class="ps-4 fw-bold text-primary">#${o.orderId}</td>
                    <td>
                        <div class="fw-bold text-dark">${o.customerName}</div>
                        <small class="text-muted"><i class="fas fa-phone-alt me-1"></i>${o.customerPhone}</small>
                    </td>
                    <td>${new Date(o.date).toLocaleDateString('ar-SA')}</td>
                    <td>
                        <span class="badge ${getStatusClass(o.status)} rounded-pill">${o.status}</span>
                    </td>
                    <td class="fw-bold">${o.total} ر.س</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-secondary" title="عرض التفاصيل">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">لا توجد طلبات لعرضها حالياً.</td></tr>';
        }
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-danger">تعذر الاتصال بخادم البيانات.</td></tr>';
    }
}

function getStatusClass(status) {
    const map = {
        'paid': 'bg-success',
        'pending': 'bg-warning text-dark',
        'cancelled': 'bg-danger',
        'delivered': 'bg-info'
    };
    return map[status] || 'bg-secondary';
}

// تشغيل التحميل عند فتح الصفحة
document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
