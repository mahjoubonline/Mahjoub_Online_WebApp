{% extends "admin/admin_base.html" %} 

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center p-3 border-top">
        <div class="text-muted small">عرض {{ pagination.page }} من {{ pagination.pages }} صفحات</div>
        <nav>
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item {{ 'disabled' if not pagination.has_prev }}">
                    <a class="page-link" href="{{ url_for('orders.orders_dashboard', page=pagination.prev_num) }}">السابق</a>
                </li>
                {% for page_num in pagination.iter_pages(left_edge=1, right_edge=1) %}
                    <li class="page-item {{ 'active' if page_num == pagination.page }}">
                        <a class="page-link" href="{{ url_for('orders.orders_dashboard', page=page_num) }}">{{ page_num }}</a>
                    </li>
                {% endfor %}
                <li class="page-item {{ 'disabled' if not pagination.has_next }}">
                    <a class="page-link" href="{{ url_for('orders.orders_dashboard', page=pagination.next_num) }}">التالي</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script>
    async function updateStatus(selectEl, orderId, type) {
        const newValue = selectEl.value;
        try {
            const response = await fetch('/admin/orders/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId: orderId, type: type, value: newValue })
            });
            const result = await response.json();
            if (result.success) {
                // إظهار تنبيه بسيط أو تغيير لون الحالة
                console.log("تم التحديث بنجاح");
            }
        } catch (error) {
            console.error("خطأ في الاتصال بالسيرفر");
        }
    }
</script>
{% endblock %}
