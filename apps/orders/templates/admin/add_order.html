{% extends 'admin/admin_base.html' %}

{% block title %}إضافة طلب جديد{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<div class="container py-4">
    <h3 class="fw-bold text-royal-purple mb-4">إضافة طلب سيادي جديد</h3>
    <div class="card shadow-sm border-royal p-4">
        <form action="{{ safe_url_for('orders.add_new_order') }}" method="POST">
            
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">اسم العميل</label>
                    <input type="text" name="customer_name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="text" name="customer_phone" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">المتجر (المورد)</label>
                    <select name="supplier_id" class="form-select select2" required>
                        <option value="" disabled selected>اختر المتجر...</option>
                        {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}">
                                {{ supplier.trade_name }} (كود: {{ supplier.supplier_code }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">المبلغ الإجمالي (SAR)</label>
                    <input type="number" step="0.01" name="total_price" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn text-white" style="background-color: var(--royal-purple);">حفظ الطلب وتسجيله</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('.select2').select2({ placeholder: "ابحث عن المتجر...", width: '100%' });
    });
</script>
{% endblock %}
