{% extends "admin/base.html" %}

{% block title %}إضافة شريك جديد | القيادة المركزية{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-1">إضافة شريك جديد</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_dashboard.dashboard') }}" class="text-decoration-none">الرئيسية</a></li>
                    <li class="breadcrumb-item text-secondary">إدارة الموردين</li>
                    <li class="breadcrumb-item active" aria-current="page">إضافة شريك</li>
                </ol>
            </nav>
        </div>
        <a href="#" class="btn btn-outline-secondary rounded-pill">
            <i class="fas fa-arrow-right me-2"></i> العودة للقائمة
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="{{ url_for('admin_suppliers.add_supplier') }}">
                        <div class="row g-4">
                            <div class="col-12">
                                <h5 class="text-primary mb-3"><i class="fas fa-store me-2"></i> معلومات المتجر</h5>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">اسم المتجر (الاسم التجاري)</label>
                                <input type="text" name="trade_name" class="form-control form-control-lg bg-light" required placeholder="مثال: متجر محجوب للإلكترونيات">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">اسم المستخدم (للدخول)</label>
                                <input type="text" name="username" class="form-control form-control-lg bg-light" required placeholder="اسم فريد بدون مسافات">
                            </div>

                            <div class="col-12 mt-4">
                                <h5 class="text-primary mb-3"><i class="fas fa-phone-alt me-2"></i> معلومات التواصل والأمان</h5>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">رقم الهاتف</label>
                                <input type="tel" name="phone" class="form-control form-control-lg bg-light" required placeholder="مثال: 967XXXXXXXXX">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">كلمة المرور الابتدائية</label>
                                <input type="password" name="password" class="form-control form-control-lg bg-light" required placeholder="********">
                            </div>
                        </div>

                        <div class="mt-5 pt-3 border-top text-end">
                            <button type="reset" class="btn btn-outline-danger px-4 py-2 me-2">إلغاء</button>
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="background-color: #1a0b2e; border: none;">
                                <i class="fas fa-user-check me-2"></i> اعتماد وإضافة الشريك
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
