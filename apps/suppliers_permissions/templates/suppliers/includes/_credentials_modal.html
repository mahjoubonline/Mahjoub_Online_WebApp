<div class="modal fade" id="staffCredentialsModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px; border: 2px solid #5b4cd1; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div class="modal-header border-0 text-center d-block pb-0" style="background-color: #f8f9fa;">
                <h5 class="modal-title fw-bold text-success" id="credModalTitle">
                    <i class="fa fa-check-circle me-2"></i> تم بنجاح
                </h5>
            </div>
            <div class="modal-body text-center p-4">
                <p class="text-muted mb-3">يرجى حفظ بيانات الدخول التالية للموظف:</p>
                
                <div class="p-3 mb-2" style="background: #fdf5ff; border: 1px dashed #5b4cd1; border-radius: 12px;">
                    <p class="mb-2 text-dark">اسم المستخدم: <strong id="newUsername" style="color: #4b0082; font-size: 1.3rem;"></strong></p>
                    <p class="mb-0 text-dark">كلمة المرور: <strong id="newPassword" style="color: #d63031; font-size: 1.3rem;"></strong></p>
                </div>
            </div>
            <div class="modal-footer border-0 d-flex justify-content-center pt-0 pb-4">
                <button type="button" class="btn text-white px-4 me-2" style="background: linear-gradient(135deg, #4b0082 0%, #000000 100%); border-radius: 10px;" onclick="copyCredentials(event)">
                    <i class="fa fa-copy me-1"></i> نسخ البيانات
                </button>
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal" style="border-radius: 10px;">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<script>
    // دالة إظهار نجاح النسخ وتغيير شكل الزر
    function showCopySuccess(btn, originalHtml) {
        btn.innerHTML = '<i class="fa fa-check me-1"></i> تم النسخ!';
        btn.style.background = '#198754';
        setTimeout(() => {
            btn.innerHTML = originalHtml;
            btn.style.background = 'linear-gradient(135deg, #4b0082 0%, #000000 100%)';
        }, 2000);
    }

    // دالة النسخ البديلة (تستخدم في حال حظر المتصفح للوصول المباشر للحافظة)
    function fallbackCopyTextToClipboard(text, btn, originalHtml) {
        var textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            var successful = document.execCommand('copy');
            if (successful) {
                showCopySuccess(btn, originalHtml);
            } else {
                alert("لم يتم النسخ، يرجى تحديد النص ونسخه يدوياً.");
            }
        } catch (err) {
            console.error('Fallback copy failed', err);
        }
        document.body.removeChild(textArea);
    }

    // الدالة الرئيسية للنسخ
    function copyCredentials(event) {
        const username = document.getElementById('newUsername').innerText;
        const password = document.getElementById('newPassword').innerText;
        const textToCopy = `اسم المستخدم: ${username}\nكلمة المرور: ${password}`;
        const btn = event.currentTarget;
        const originalHtml = btn.innerHTML;
        
        // التحقق من دعم API الحافظة الحديث
        if (!navigator.clipboard) {
            fallbackCopyTextToClipboard(textToCopy, btn, originalHtml);
            return;
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            showCopySuccess(btn, originalHtml);
        }).catch(err => {
            fallbackCopyTextToClipboard(textToCopy, btn, originalHtml);
        });
    }
</script>
