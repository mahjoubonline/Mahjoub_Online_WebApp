<div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div class="modal-header" style="background-color: #5b4cd1; color: white; border-radius: 15px 15px 0 0;">
                <h5 class="modal-title"><i class="fa fa-user-plus me-2"></i> إضافة موظف جديد</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم</label>
                        <input type="text" id="username" name="username" class="form-control" 
                               placeholder="أدخل اسم المستخدم بالإنجليزية" oninput="checkAvailability('username', this.value)" required>
                        <div id="username-msg" class="mt-1 small fw-bold"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="text" id="phone" name="phone" class="form-control" 
                               placeholder="مثال: 7xxxxxxxx" oninput="checkAvailability('phone', this.value)" required>
                        <div id="phone-msg" class="mt-1 small fw-bold"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" name="can_view_wallet" id="wallet">
                        <label class="form-check-label" for="wallet">السماح برؤية المحفظة</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" name="can_manage_orders" id="orders">
                        <label class="form-check-label" for="orders">السماح بإدارة الطلبات</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                    <button type="submit" id="submit-btn" class="btn btn-primary" style="background-color: #5b4cd1;">حفظ الموظف</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
async function checkAvailability(field, value) {
    if (value.length < 3) return;
    
    const msgDiv = document.getElementById(field + '-msg');
    const response = await fetch("{{ url_for('suppliers_permissions.check_availability') }}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}'
        },
        body: JSON.stringify({ field: field, value: value })
    });
    
    const data = await response.json();
    const submitBtn = document.getElementById('submit-btn');
    
    if (data.available) {
        msgDiv.innerHTML = '<span class="text-success"><i class="fa fa-check-circle"></i> متاح</span>';
        submitBtn.disabled = false;
    } else {
        msgDiv.innerHTML = '<span class="text-danger"><i class="fa fa-times-circle"></i> هذا ' + (field=='username'?'الاسم':'الرقم') + ' مستخدم مسبقاً!</span>';
        submitBtn.disabled = true;
    }
}
</script>
