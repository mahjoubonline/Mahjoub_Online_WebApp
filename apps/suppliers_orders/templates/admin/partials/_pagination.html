<nav aria-label="ترقيم صفحات الطلبات" class="mt-4">
    <ul class="pagination justify-content-center pagination-sm">
        
        <!-- زر الصفحة السابقة -->
        <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
            <a class="page-link" href="#" 
               onclick="updateSupplierTable('{{ url_for(request.endpoint, page=pagination.prev_num) }}'); return false;">
               <i class="fas fa-chevron-right"></i>
            </a>
        </li>
        
        <!-- أرقام الصفحات -->
        {% for page in pagination.iter_pages(left_edge=1, left_current=2, right_current=2, right_edge=1) %}
            {% if page %}
                <li class="page-item {% if page == pagination.page %}active{% endif %}">
                    <a class="page-link" href="#" 
                       onclick="updateSupplierTable('{{ url_for(request.endpoint, page=page) }}'); return false;">
                       {{ page }}
                    </a>
                </li>
            {% else %}
                <li class="page-item disabled"><span class="page-link">...</span></li>
            {% endif %}
        {% endfor %}

        <!-- زر الصفحة التالية -->
        <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
            <a class="page-link" href="#" 
               onclick="updateSupplierTable('{{ url_for(request.endpoint, page=pagination.next_num) }}'); return false;">
               <i class="fas fa-chevron-left"></i>
            </a>
        </li>
        
    </ul>
</nav>

<style>
    .pagination .page-link {
        color: #1a0b2e;
        border-color: #dee2e6;
    }
    .pagination .page-item.active .page-link {
        background-color: #1a0b2e;
        border-color: #1a0b2e;
        color: #D4AF37;
    }
</style>
