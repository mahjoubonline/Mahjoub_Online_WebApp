{% extends "admin/base.html" %}

{% block content %}
<div class="card shadow mb-4">
    <div class="card-header py-3 d-flex justify-content-between">
        <h6 class="m-0 font-weight-bold text-primary">آخر المنتجات المزامنة (10)</h6>
        <button class="btn btn-sm btn-success" onclick="syncNow()">مزامنة الآن</button>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>المورد (البصمة)</th>
                    <th>السعر</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="bridge-table-body">
                {% for p in products %}
                <tr>
                    <td>{{ p.title }}</td>
                    <td>{{ p.custom_fields.supplier_id }}</td>
                    <td>{{ p.price }}</td>
                    <td><span class="badge bg-info">مُزامَن</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div class="d-flex justify-content-between mt-3">
            <a href="?page={{ page - 1 }}" class="btn btn-outline-primary {% if page == 1 %}disabled{% endif %}">السابق</a>
            <span>صفحة {{ page }}</span>
            <a href="?page={{ page + 1 }}" class="btn btn-outline-primary">التالي</a>
        </div>
    </div>
</div>

<script>
function syncNow() {
    // كود AJAX لبدء المزامنة اللحظية
    alert("بدء مزامنة المنتجات...");
}
</script>
{% endblock %}
