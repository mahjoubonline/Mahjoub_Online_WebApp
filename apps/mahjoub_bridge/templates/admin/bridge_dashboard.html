{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold text-dark"><i class="fas fa-network-wired text-primary me-2"></i> الجسر السيادي (محجوب أونلاين)</h5>
        <div class="d-flex gap-2">
            <input type="text" id="searchInput" class="form-control form-control-sm" 
                   placeholder="ابحث في المتجر..." oninput="currentPage=1; loadData()">
            <button class="btn btn-sm btn-primary" onclick="syncNow(this)">
                <i class="fas fa-sync-alt"></i> مزامنة
            </button>
        </div>
    </div>

    <div id="productContainer" class="row row-cols-1 row-cols-md-4 row-cols-lg-6 g-3">
        <div class="col-12 text-center py-5 text-muted">جاري الاتصال بقمرة...</div>
    </div>

    <nav class="mt-4">
        <ul class="pagination pagination-sm justify-content-center" id="paginationContainer"></ul>
    </nav>
</div>

<script>
let currentPage = 1;

async function loadData(page = 1) {
    currentPage = page;
    const query = document.getElementById('searchInput').value;
    const container = document.getElementById('productContainer');
    
    try {
        const res = await fetch(`/bridge/api/search?q=${encodeURIComponent(query)}&page=${page}`);
        const data = await res.json();
        
        if (!data.products || data.products.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5">لا توجد نتائج مطابقة.</div>';
            return;
        }

        // عرض المنتجات بشكل مشابه لمتجر قمرة
        container.innerHTML = data.products.map(p => `
            <div class="col">
                <div class="card h-100 border-0 shadow-sm overflow-hidden">
                    <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="card-img-top" style="height:120px; object-fit:cover;">
                    <div class="p-2">
                        <small class="d-block fw-bold text-truncate" title="${p.title}">${p.title}</small>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="text-primary fw-bold small">${p.price} ر.س</span>
                            <span class="badge ${p.quantity > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'} small">${p.quantity}</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        renderPagination(data.total_pages);
    } catch (e) {
        container.innerHTML = '<div class="col-12 text-danger text-center">خطأ في الاتصال بالخادم.</div>';
    }
}

function renderPagination(totalPages) {
    const pag = document.getElementById('paginationContainer');
    pag.innerHTML = '';
    for(let i = 1; i <= Math.min(totalPages, 5); i++) { // عرض أول 5 صفحات للتنظيم
        pag.innerHTML += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="event.preventDefault(); loadData(${i})">${i}</a>
            </li>`;
    }
}

async function syncNow(btn) {
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
    await fetch('/bridge/sync', { method: 'POST' });
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sync-alt"></i> مزامنة';
    loadData(1);
}

// تحميل البيانات عند فتح الصفحة
loadData(1);
</script>
{% endblock %}
