{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    .product-card { transition: transform 0.2s; border: 1px solid #e9ecef; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important; }
    .badge-qty { font-size: 0.7rem; padding: 0.25rem 0.5rem; }
    .card-img-top { background-color: #f8f9fa; }
</style>

<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold text-dark"><i class="fas fa-network-wired text-primary me-2"></i> الجسر السيادي (محجوب أونلاين)</h5>
        <div class="d-flex gap-2">
            <input type="text" id="searchInput" class="form-control form-control-sm" 
                   placeholder="ابحث عن منتج..." oninput="debounceSearch()">
            <button class="btn btn-sm btn-primary" onclick="syncNow(this)">
                <i class="fas fa-sync-alt"></i> مزامنة
            </button>
        </div>
    </div>

    <div id="productContainer" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3"></div>

    <div class="text-center mt-4">
        <button id="loadMoreBtn" class="btn btn-outline-primary btn-sm" style="display:none;" onclick="loadMore()">
            تحميل المزيد...
        </button>
    </div>
</div>

<script>
let currentPage = 1;
let searchTimer;

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { 
        currentPage = 1; 
        loadData(1, false); 
    }, 500);
}

async function loadData(page = 1, append = false) {
    const query = document.getElementById('searchInput').value;
    const container = document.getElementById('productContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    
    if (!append) container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';
    
    try {
        const res = await fetch(`/bridge/api/search?q=${encodeURIComponent(query)}&page=${page}`);
        const data = await res.json();
        
        if (!append) container.innerHTML = '';

        if (data.status === "success" && data.products.length > 0) {
            container.innerHTML += data.products.map(p => `
                <div class="col">
                    <div class="card product-card h-100 border-0 shadow-sm">
                        <img src="${p.image_url}" class="card-img-top" style="height:140px; object-fit:contain;" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="p-2">
                            <small class="d-block fw-bold text-truncate" title="${p.title}">${p.title}</small>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="text-primary fw-bold small">${p.price} ر.س</span>
                                <span class="badge ${p.quantity > 0 ? 'bg-success' : 'bg-danger'} badge-qty">${p.quantity} قطع</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            loadMoreBtn.style.display = 'block';
        } else if (!append) {
            container.innerHTML = '<div class="col-12 text-center py-5 text-muted">لا توجد نتائج.</div>';
            loadMoreBtn.style.display = 'none';
        } else {
            loadMoreBtn.style.display = 'none'; // لا توجد نتائج أخرى
        }
    } catch (e) {
        container.innerHTML = '<div class="col-12 text-danger text-center">خطأ في الاتصال.</div>';
    }
}

function loadMore() {
    currentPage++;
    loadData(currentPage, true);
}

async function syncNow(btn) {
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    await fetch('/bridge/sync', { method: 'POST' });
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sync-alt"></i>';
    loadData(1, false);
}

loadData(1, false);
</script>
{% endblock %}
