<script>
// نستخدم تأخير بسيط لضمان أن جميع ملفات DataTable تم تحميلها بالكامل
setTimeout(function() {
    $(document).ready(function() {
        // التحقق من وجود الجدول وأن المكتبة متاحة
        if ($('#staffTable').length && $.fn.DataTable) {
            
            // تدمير أي نسخة سابقة لضمان عدم حدوث تكرار
            if ($.fn.DataTable.isDataTable('#staffTable')) {
                $('#staffTable').DataTable().destroy();
            }
            
            // تهيئة الجدول
            $('#staffTable').DataTable({
                "pageLength": 10,
                "searching": true,
                "paging": true,
                "ordering": true,
                "language": {
                    "search": "بحث:",
                    "lengthMenu": "عرض _MENU_ سجل",
                    "info": "عرض _START_ إلى _END_ من _TOTAL_ سجل",
                    "paginate": { 
                        "next": "التالي", 
                        "previous": "السابق" 
                    }
                },
                "initComplete": function(settings, json) {
                    // هذا الجزء يضمن إظهار العناصر إذا كانت مخفية لأي سبب تنسيقي
                    $('.dataTables_wrapper').find('.dataTables_filter, .dataTables_paginate').show();
                }
            });
        }
    });
}, 500); // تأخير نصف ثانية لضمان تحميل كل شيء
</script>
