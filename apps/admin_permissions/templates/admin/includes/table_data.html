<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-hover" id="staffTable">
            <thead>
                <tr><th>#</th><th>الموظف</th><th>الدور</th><th>الحالة</th><th>الإجراءات</th></tr>
            </thead>
            <tbody>
                {% for member in staff %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td><strong>{{ member.username }}</strong><br><small>{{ member.phone }}</small></td>
                    <td><span class="badge bg-warning">{{ member.role }}</span></td>
                    <td>{{ 'نشط' if member.is_active else 'موقوف' }}</td>
                    <td><button class="btn btn-sm btn-outline-dark">خيارات</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
