<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشركاء الموحدة | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05020a; --gold: #ce9e49; --card-bg: #0f071c; --error: #ff4d4d; --success: #28a745; }
        
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 20px; overflow: hidden; 
        }
        
        .wrapper { 
            display: flex; width: 100%; max-width: 900px; max-height: 85vh; 
            background: rgba(15, 7, 28, 0.95); border: 1px solid #333; 
            border-radius: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .side { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .marketing-side { background: linear-gradient(145deg, #160d26, #05020a); border-left: 1px solid #222; }
        
        .btn-gold { padding: 15px; background: linear-gradient(90deg, #ce9e49, #9e7634); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; margin: 10px 0; width: 100%; transition: transform 0.2s, opacity 0.3s; }
        .btn-gold:hover { transform: scale(1.02); opacity: 0.9; }
        
        .cyber-input { background: #000; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; outline: none; transition: border 0.3s; }
        .cyber-input:focus { border-color: var(--gold); }
        
        .hidden { display: none; }
        .forgot-link { color: #666; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 10px; }
        #status-msg { padding: 10px; margin-bottom: 15px; border-radius: 8px; display: none; text-align: center; font-size: 0.85rem; border: 1px solid transparent; }
        
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; }
            .wrapper { flex-direction: column; }
            .side { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side marketing-side">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">بوابة الشركاء <span style="color:var(--gold)">السيادية</span></h1>
        <p style="color: #aaa;">نظام إدارة الموردين والمسوقين المركزي لمحجوب أونلاين. الدخول محمي ومراقب.</p>
    </div>
    
    <div class="side" id="auth-container">
        <div id="status-msg"></div>

        <div id="main-menu">
            <h3 style="color: var(--gold); margin-top: 0;">اختر نوع الدخول</h3>
            <button class="btn-gold" onclick="showForm('supplier-login')">دخول الموردين</button>
            <button class="btn-gold" style="background: #222; color: #fff;" onclick="showForm('marketer-login')">دخول المسوقين</button>
        </div>

        <!-- Supplier Login -->
        <div id="supplier-login" class="hidden">
            <h3 style="color: var(--gold);">دخول الموردين</h3>
            <input type="text" id="sup-user" class="cyber-input" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="sup-pass" class="cyber-input" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="loginUser('supplier')">تأكيد الدخول</button>
            <button onclick="showForm('menu')" style="background:none; border:none; color:#666; cursor:pointer; margin-top:10px;">عودة للقائمة</button>
        </div>

        <!-- Marketer Login -->
        <div id="marketer-login" class="hidden">
            <h3 style="color: var(--gold);">دخول المسوقين</h3>
            <input type="text" id="marketer-user" class="cyber-input" placeholder="رمز المسوق">
            <input type="password" id="marketer-pass" class="cyber-input" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="loginUser('marketer')">تأكيد الدخول</button>
            <button onclick="showForm('menu')" style="background:none; border:none; color:#666; cursor:pointer; margin-top:10px;">عودة للقائمة</button>
        </div>
    </div>
</div>

<script>
    const loginUrl = "{{ url_for('suppliers_auth.login') }}";

    function showMessage(text, type) {
        const msg = document.getElementById('status-msg');
        msg.innerText = text;
        msg.style.display = "block";
        msg.style.background = type === 'error' ? "rgba(220, 53, 69, 0.1)" : "rgba(40, 167, 69, 0.1)";
        msg.style.color = type === 'error' ? "#ff4d4d" : "#28a745";
        msg.style.borderColor = type === 'error' ? "#ff4d4d" : "#28a745";
    }

    function showForm(type) {
        document.getElementById('status-msg').style.display = 'none';
        document.querySelectorAll('#auth-container > div:not(#status-msg)').forEach(d => d.classList.add('hidden'));
        if(type === 'menu') document.getElementById('main-menu').classList.remove('hidden');
        else document.getElementById(type).classList.remove('hidden');
    }

    async function loginUser(role) {
        const data = role === 'supplier' ? 
            {type: 'supplier', username: document.getElementById('sup-user').value, password: document.getElementById('sup-pass').value} :
            {type: 'marketer', username: document.getElementById('marketer-user').value, password: document.getElementById('marketer-pass').value};
        
        try {
            const response = await fetch(loginUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token() }}'
                },
                body: JSON.stringify(data)
            });
            const res = await response.json();
            if(res.status === 'success') window.location.href = res.redirect;
            else showMessage(res.message, 'error');
        } catch(e) { 
            console.error(e);
            showMessage('خطأ في الاتصال بالسيرفر', 'error'); 
        }
    }
</script>
</body>
</html>
