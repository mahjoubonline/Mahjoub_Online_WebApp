{% extends "admin_base.html" %}

{% block title %}إضافة مورد جديد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid py-4" id="main-content">
    <!-- رأس الصفحة مع حركة بسيطة -->
    <div class="mb-4 d-flex justify-content-between align-items-center animate__animated animate__fadeIn">
        <div>
            <h2 class="fw-bold" style="color: #4B0082;">🛡️ تعميد مورد جديد</h2>
            <p class="text-muted">نظام الأرشفة السيادي لمنصة محجوب أونلاين.</p>
        </div>
        <div class="p-3 border rounded-3 bg-white shadow-sm text-center border-gold">
            <small class="d-block text-muted fw-bold">رقم الاعتماد</small>
            <span class="fw-bold text-dark fs-5">SUP-{{ next_id if next_id else '000' }}</span>
        </div>
    </div>

    <form id="addSupplierForm" method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            
            <!-- العمود الأول: الهوية -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100 custom-card">
                    <div class="d-flex align-items-center mb-4">
                        <div class="icon-box me-2"><i class="fas fa-user-shield"></i></div>
                        <h5 class="fw-bold mb-0">الهوية والتوثيق</h5>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" name="username" class="form-control bg-light" id="userInp" placeholder="اسم المستخدم" required>
                        <label for="userInp">اسم المستخدم</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">فئة المورد</label>
                        <select name="category" class="form-select bg-light border-0 py-2" required>
                            <option value="">اختر الفئة...</option>
                            <option value="جملة">تاجر جملة</option>
                            <option value="تجزئة">تاجر تجزئة</option>
                            <option value="مصنع">مصنع / منتج</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">رفع صورة الوثيقة</label>
                        <input type="file" name="identity_image" class="form-control bg-light border-0">
                    </div>
                </div>
            </div>

            <!-- العمود الثاني: النطاق الجغرافي -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100 custom-card">
                    <div class="d-flex align-items-center mb-4">
                        <div class="icon-box me-2"><i class="fas fa-map-marker-alt"></i></div>
                        <h5 class="fw-bold mb-0">النشاط والنطاق</h5>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" name="trade_name" class="form-control bg-light" id="tradeInp" placeholder="الاسم التجاري" required>
                        <label for="tradeInp">الاسم التجاري</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">المحافظة</label>
                        <select name="province" id="provinceSelect" class="form-select bg-light border-0 py-2" onchange="updateDistricts()" required>
                            <option value="">اختر المحافظة...</option>
                            <option value="الحديدة">الحديدة</option>
                            <option value="تعز">تعز</option>
                            <option value="عدن">عدن</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">المديرية</label>
                        <select name="district" id="districtSelect" class="form-select bg-light border-0 py-2" required>
                            <option value="">اختر المحافظة أولاً...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- العمود الثالث: الأمان والمالية -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100 custom-card">
                    <div class="d-flex align-items-center mb-4">
                        <div class="icon-box me-2"><i class="fas fa-wallet"></i></div>
                        <h5 class="fw-bold mb-0">المحفظة والأمان</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">وسيلة الدفع</label>
                        <select name="bank_name" class="form-select bg-light border-0 py-2" required>
                            <option value="الكريمي">بنك الكريمي</option>
                            <option value="النجم">النجم للحوالات</option>
                            <option value="تداول">محفظة تداول</option>
                            <option value="كاش">كاش</option>
                        </select>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" name="bank_acc" class="form-control bg-light" id="accInp" placeholder="رقم الحساب" required>
                        <label for="accInp">رقم الحساب</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" name="password" class="form-control bg-light" id="passInp" placeholder="كلمة المرور" required>
                        <label for="passInp">كلمة المرور الأولية</label>
                    </div>
                    <div class="mt-auto">
                        <button type="submit" class="btn w-100 btn-submit fw-bold shadow">
                            تعميد المورد الآن <i class="fas fa-shield-alt ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- التنسيقات التفاعلية -->
<style>
    :root {
        --royal-purple: #4B0082;
        --gold-glow: #D4AF37;
    }

    .custom-card {
        border-top: 5px solid var(--gold-glow) !important;
        transition: all 0.3s ease;
    }

    .custom-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
    }

    .icon-box {
        width: 40px;
        height: 40px;
        background: rgba(75, 0, 130, 0.1);
        color: var(--royal-purple);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
    }

    .form-control:focus, .form-select:focus {
        border: 2px solid var(--gold-glow) !important;
        background-color: #fff !important;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .btn-submit {
        background: linear-gradient(45deg, var(--royal-purple), #6a1b9a);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 10px;
        transition: 0.4s;
    }

    .btn-submit:hover {
        background: var(--gold-glow);
        color: var(--royal-purple);
        transform: scale(1.02);
    }

    .border-gold { border: 1px solid var(--gold-glow) !important; }
</style>

<!-- الجافاسكريبت التفاعلي -->
<script>
function updateDistricts() {
    const province = document.getElementById('provinceSelect').value;
    const districtSelect = document.getElementById('districtSelect');
    districtSelect.innerHTML = '<option value="">اختر المديرية...</option>';

    const data = {
        'الحديدة': ['الخوخة', 'حيس', 'التحيتا', 'باجل'],
        'تعز': ['المخا', 'ذوباب', 'موزع', 'القاهرة'],
        'عدن': ['المنصورة', 'كريتر', 'خور مكسر']
    };

    if (province && data[province]) {
        data[province].forEach(d => {
            let opt = new Option(d, d);
            districtSelect.add(opt);
        });
    }
}

// إضافة تأثير عند إرسال النموذج
document.getElementById('addSupplierForm').onsubmit = function() {
    const btn = document.querySelector('.btn-submit');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جارٍ التعميد...';
    btn.disabled = true;
};
</script>
{% endblock %}
