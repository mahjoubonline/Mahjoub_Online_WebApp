{% extends "admin/admin_base.html" %}

{% block title %}تعميد مورد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid" id="main-content">
    <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-4 rounded-4 shadow-sm border-end border-4" style="border-color: var(--royal-purple) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: var(--royal-purple);">🛡️ تعميد مورد جديد</h2>
            <p class="text-muted mb-0 small">نظام الأرشفة السيادي - محجوب أونلاين 2026</p>
        </div>
        <div class="d-flex gap-4 text-center">
            <div class="px-3 border-start">
                <small class="d-block text-muted fw-bold">معرف المورد</small>
                <span class="fs-5 fw-bold text-dark" id="display-supplier-id">...</span>
            </div>
            <div class="px-3">
                <small class="d-block text-muted fw-bold">معرف المحفظة</small>
                <span class="fs-5 fw-bold text-success" id="display-wallet-id">...</span>
            </div>
        </div>
    </div>

    <div id="alert-container"></div>

    <form id="addSupplierForm" method="POST" enctype="multipart/form-data" action="{{ url_for('add_supplier.add_supplier_submit') }}">
        <input type="hidden" name="sovereign_id" id="hidden-sovereign-id">
        <input type="hidden" name="wallet_code" id="hidden-wallet-code">

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <div class="d-flex align-items-center mb-4">
                        <div class="p-2 rounded-3" style="background: rgba(99, 44, 143, 0.1);"><i class="fas fa-shield-alt" style="color: var(--royal-purple);"></i></div>
                        <h5 class="fw-bold mb-0 ms-3">بيانات الوصول والوثائق</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">اسم المستخدم (Login)</label>
                        <input type="text" name="username" id="input-username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">كلمة مرور النظام</label>
                        <input type="password" name="password" id="input-password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">نوع الوثيقة</label>
                        <select name="identity_type" class="form-select" required>
                            <option value="بطاقة شخصية">بطاقة شخصية</option>
                            <option value="سجل تجاري">سجل تجاري</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">رقم الوثيقة</label>
                        <input type="text" name="identity_number" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <div class="d-flex align-items-center mb-4">
                        <div class="p-2 rounded-3" style="background: rgba(99, 44, 143, 0.1);"><i class="fas fa-user" style="color: var(--royal-purple);"></i></div>
                        <h5 class="fw-bold mb-0 ms-3">الهوية والتوزيع الجغرافي</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">الاسم الكامل للمالك</label>
                        <input type="text" name="owner_name" class="form-control" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-8">
                            <label class="form-label text-muted small">الاسم التجاري</label>
                            <input type="text" name="trade_name" id="input-tradename" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label text-muted small">رقم المحل</label>
                            <input type="text" name="shop_number" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">هاتف المالك</label>
                        <input type="tel" name="owner_phone" class="form-control" placeholder="7XXXXXXXX" required>
                    </div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label text-muted small">المحافظة</label>
                            <select name="province" id="provinceSelect" class="form-select" required>
                                <option value="" selected disabled>اختر المحافظة...</option>
                                <option value="الحديدة">الحديدة</option>
                                <option value="عدن">عدن</option>
                                <option value="تعز">تعز</option>
                                <option value="صنعاء">صنعاء</option>
                                <option value="حضرموت">حضرموت</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-muted small">المديرية</label>
                            <select name="district" id="districtSelect" class="form-select" required disabled>
                                <option value="" selected disabled>اختر المديرية...</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100 d-flex flex-column">
                    <div class="d-flex align-items-center mb-4">
                        <div class="p-2 rounded-3" style="background: rgba(99, 44, 143, 0.1);"><i class="fas fa-wallet" style="color: var(--royal-purple);"></i></div>
                        <h5 class="fw-bold mb-0 ms-3">الربط والسيادة المالية</h5>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">نوع الحساب المالي</label>
                        <select name="fin_type" id="finTypeSelect" class="form-select" required>
                            <option value="" selected disabled>اختر نوع الجهة المالية...</option>
                            <option value="بنوك">بنوك ومؤسسات مصرفية</option>
                            <option value="شركات صرافة">شركات وشبكات صرافة</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">الجهة المالية المعتمدة</label>
                        <select name="bank_name" id="bankNameSelect" class="form-select" required disabled>
                            <option value="" selected disabled>اختر الجهة المالية أولاً...</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small">رقم الحساب / الآيبان (IBAN)</label>
                        <input type="text" name="bank_acc" class="form-control" required>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-lg w-100 text-white mt-auto" style="background: var(--royal-purple); border-radius: 12px;">
                        <span id="btnText">اعتماد المورد الآن</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<style>
    .card { border-radius: 16px !important; }
    .form-control, .form-select { background: #f8f9fa !important; border: 1px solid #e9ecef !important; border-radius: 10px !important; padding: 12px !important; }
    .form-control:focus { background: #fff !important; border-color: var(--royal-purple) !important; box-shadow: 0 0 0 0.2rem rgba(99, 44, 143, 0.1); }
    .copy-btn { border-radius: 8px; padding: 4px 10px; font-size: 12px; transition: all 0.2s; }
    .copy-btn:hover { background: var(--royal-purple) !important; color: white !important; }
</style>

<script>
    const geographicData = {
        "الحديدة": ["الخوخة", "حيس", "الحوك", "الميناء", "الحالي", "بيت الفقيه", "باجل", "الزهرة"],
        "عدن": ["المنصورة", "الشيخ عثمان", "كريتر", "المعلا", "التواهي", "خور مكسر", "البريقة", "دار سعد"],
        "تعز": ["المخا", "المظفر", "القاهرة", "صالة", "التربة", "ذوباب", "الوازعية", "موزع"],
        "صنعاء": ["السبعين", "التحرير", "شعوب", "الوحدة", "الثورة", "بني الحارث", "معين"],
        "حضرموت": ["المكلا", "سيئون", "الشحر", "تريم", "القطن", "شبام"]
    };

    const financialData = {
        "بنوك": [
            "بنك القطيبي الإسلامي", 
            "بنك البسيري الدقيق", 
            "بنك التضامن الإسلامي", 
            "بنك اليمن والكويت", 
            "بنك الكريمي الإسلامي للتمويل الأصغر",
            "بنك سبأ الإسلامي"
        ],
        "شركات صرافة": [
            "شركة العمقي وإخوانه للصرافة", 
            "شركة النجم للصرافة", 
            "شركة سويد وأولاده للصرافة", 
            "شركة دادية للصرافة", 
            "شركة مصلح للصرافة",
            "شبكة الامتياز والحزم"
        ]
    };

    const provinceSelect = document.getElementById('provinceSelect');
    const districtSelect = document.getElementById('districtSelect');

    provinceSelect.addEventListener('change', function() {
        const selectedProvince = this.value;
        districtSelect.innerHTML = '<option value="" selected disabled>اختر المديرية...</option>';
        
        if (geographicData[selectedProvince]) {
            geographicData[selectedProvince].forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                districtSelect.appendChild(option);
            });
            districtSelect.disabled = false;
        } else {
            districtSelect.disabled = true;
        }
    });

    const finTypeSelect = document.getElementById('finTypeSelect');
    const bankNameSelect = document.getElementById('bankNameSelect');

    finTypeSelect.addEventListener('change', function() {
        const selectedType = this.value;
        bankNameSelect.innerHTML = `<option value="" selected disabled>اختر ${selectedType}...</option>`;
        
        if (financialData[selectedType]) {
            financialData[selectedType].forEach(entity => {
                const option = document.createElement('option');
                option.value = entity;
                option.textContent = entity;
                bankNameSelect.appendChild(option);
            });
            bankNameSelect.disabled = false;
        } else {
            bankNameSelect.disabled = true;
        }
    });

    // دالة النسخ إلى الحافظة
    function copyToClipboard(text, btnElement) {
        navigator.clipboard.writeText(text).then(() => {
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
            btnElement.classList.replace('btn-outline-secondary', 'btn-success');
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.replace('btn-success', 'btn-outline-secondary');
            }, 1500);
        }).catch(err => console.error("فشل النسخ:", err));
    }

    fetch("{{ url_for('add_supplier.check_duplicate', type='get_next_sequence') }}")
    .then(res => res.json())
    .then(data => {
        document.getElementById('display-supplier-id').textContent = data.next_sequence;
        document.getElementById('display-wallet-id').textContent = data.next_wallet;
        document.getElementById('hidden-sovereign-id').value = data.next_sequence;
        document.getElementById('hidden-wallet-code').value = data.next_wallet;
    })
    .catch(err => console.error("Error fetching sequence:", err));

    document.getElementById('addSupplierForm').onsubmit = function(e) {
        e.preventDefault();
        
        const form = this;
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const alertContainer = document.getElementById('alert-container');

        // 🧠 استعلام لحظي: الاحتفاظ بالبيانات المدخلة قبل الـ Reset
        const cachedUsername = document.getElementById('input-username').value;
        const cachedPassword = document.getElementById('input-password').value;
        const cachedTradeName = document.getElementById('input-tradename').value;

        submitBtn.disabled = true;
        btnText.textContent = "جاري الحفظ والتعميد...";
        btnSpinner.classList.remove('d-none');
        alertContainer.innerHTML = ''; 

        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            submitBtn.disabled = false;
            btnText.textContent = "اعتماد المورد الآن";
            btnSpinner.classList.add('d-none');

            if (data.status === 'success') {
                // بناء إشعار النجاح التفاعلي المتقدم مع أزرار النسخ والتنبيه والشكر المخصص
                alertContainer.innerHTML = `
                    <div class="alert alert-success alert-dismissible fade show rounded-4 p-4 mb-4 border-0 shadow-sm position-relative" role="alert" style="background-color: #f4fbf7; border-right: 5px solid #28a745 !important;">
                        <div class="d-flex align-items-center mb-3">
                            <span class="fs-4 me-2">🎉</span>
                            <h5 class="fw-bold text-success mb-0">تم تعميد المورد وإصدار الحساب بنجاح!</h5>
                        </div>
                        <p class="text-dark mb-3">${data.message}</p>
                        
                        <div class="bg-white p-3 rounded-3 shadow-sm border mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                                <div><small class="text-muted d-block">اسم المتجر</small><strong class="text-dark">${cachedTradeName}</strong></div>
                                <button type="button" class="btn btn-sm btn-outline-secondary copy-btn" onclick="copyToClipboard('${cachedTradeName}', this)"><i class="far fa-copy"></i> نسخ</button>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                                <div><small class="text-muted d-block">اسم المستخدم</small><strong class="text-dark">${cachedUsername}</strong></div>
                                <button type="button" class="btn btn-sm btn-outline-secondary copy-btn" onclick="copyToClipboard('${cachedUsername}', this)"><i class="far fa-copy"></i> نسخ</button>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <div><small class="text-muted d-block">كلمة المرور الافتراضية</small><strong class="text-danger">${cachedPassword}</strong></div>
                                <button type="button" class="btn btn-sm btn-outline-secondary copy-btn" onclick="copyToClipboard('${cachedPassword}', this)"><i class="far fa-copy"></i> نسخ</button>
                            </div>
                        </div>

                        <div class="alert alert-warning rounded-3 p-2 mb-3 border-0 small d-flex align-items-center">
                            <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                            <span class="fw-bold text-dark">تنبيه حماية الأرشفة: يرجى توجيه المورد لتغيير كلمة المرور المؤقتة فور تسجيل الدخول الأول له.</span>
                        </div>

                        <div class="text-center pt-2 border-top">
                            <p class="mb-0 fw-bold small text-muted" style="color: var(--royal-purple) !important;">🚨 شكراً لاستخدامكم منصة محجوب أونلاين | سوقك الذكي 🚨</p>
                        </div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="top: 20px; left: 20px; right: auto;"></button>
                    </div>
                `;
                
                form.reset();
                districtSelect.disabled = true;
                bankNameSelect.disabled = true;
                
                if (data.next_sequence && data.next_wallet) {
                    document.getElementById('display-supplier-id').textContent = data.next_sequence;
                    document.getElementById('display-wallet-id').textContent = data.next_wallet;
                    document.getElementById('hidden-sovereign-id').value = data.next_sequence;
                    document.getElementById('hidden-wallet-code').value = data.next_wallet;
                }
            } else {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show rounded-3 p-3 mb-4" role="alert">
                        <strong>⚠️ فشل التعميد:</strong> ${data.message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            btnText.textContent = "اعتماد المورد الآن";
            btnSpinner.classList.add('d-none');
            alertContainer.innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show rounded-3 p-3 mb-4" role="alert">
                    <strong>❌ خطأ في النظام:</strong> تعذر الاتصال بالخادم. يرجى التحقق من سجلات السيرفر.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            console.error("Submission error:", err);
        });
    };
</script>
{% endblock %}
