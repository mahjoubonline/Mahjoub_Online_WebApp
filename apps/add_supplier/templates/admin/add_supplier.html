{% extends "admin/admin_base.html" %}

{% block title %}تعميد مورد | محجوب أونلاين{% endblock %}

{% block header_title %}تعميد شريك نجاح جديد{% endblock %}

{% block content %}
<div class="container-fluid">
    <div id="alert-container"></div>

    <form id="addSupplierForm" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="sovereign_id" id="hidden-sovereign-id">
        <input type="hidden" name="wallet_code" id="hidden-wallet-code">

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="fas fa-shield-alt text-primary"></i> بيانات الوصول</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">اسم المستخدم</label>
                        <input type="text" name="username" id="input-username" class="form-control" required onblur="checkField('username', this.value)">
                        <div class="feedback-msg small mt-1" id="msg-username"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">كلمة مرور النظام</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">نوع الوثيقة</label>
                        <select name="identity_type" class="form-select">
                            <option value="بطاقة شخصية">بطاقة شخصية</option>
                            <option value="سجل تجاري">سجل تجاري</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="fas fa-user text-primary"></i> الهوية والنشاط</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">الاسم الكامل للمالك</label>
                        <input type="text" name="owner_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">فئة النشاط</label>
                        <div class="input-group">
                            <select name="category" id="categorySelect" class="form-select">
                                <option value="ملابس">ملابس</option>
                                <option value="إلكترونيات">إلكترونيات</option>
                            </select>
                            <button type="button" class="btn btn-outline-secondary" onclick="addNewCategory()">+</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">المحافظة</label>
                        <select name="province" class="form-select">
                            <option value="الحديدة">الحديدة</option>
                            <option value="عدن">عدن</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="fas fa-wallet text-primary"></i> الربط المالي</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">رقم الحساب (IBAN)</label>
                        <input type="text" name="bank_acc" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-auto">اعتماد المورد</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    // جلب المعرفات التلقائية عند التحميل
    window.onload = function() {
        fetch("{{ url_for('add_supplier.check_duplicate') }}?type=get_next_sequence")
        .then(response => response.json())
        .then(data => {
            document.getElementById('hidden-sovereign-id').value = data.next_sequence;
            document.getElementById('hidden-wallet-code').value = data.next_wallet;
        });
    };

    function addNewCategory() {
        const newCat = prompt("أدخل اسم الفئة الجديدة:");
        if (newCat) {
            const select = document.getElementById('categorySelect');
            const option = document.createElement('option');
            option.value = newCat;
            option.textContent = newCat;
            select.appendChild(option);
        }
    }

    // معالجة الإرسال عبر AJAX لمنع إعادة تحميل الصفحة
    document.getElementById('addSupplierForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        
        fetch("{{ url_for('add_supplier.add_supplier_submit') }}", {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert(data.message);
                location.reload();
            } else {
                alert("خطأ: " + data.message);
            }
        });
    };
</script>
{% endblock %}
