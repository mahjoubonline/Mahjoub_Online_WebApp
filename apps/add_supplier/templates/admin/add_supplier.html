{% extends "admin/admin_base.html" %}

{% block content %}
<style>
    :root {
        --gov-purple: #632C8F;
        --gov-gold: #C5A021;
        --text-main: #1e293b;
        --accent-green: #10b981;
        --input-bg: #f8fafc;
    }
    .form-container { max-width: 1100px; margin: 20px auto; direction: rtl; background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .form-header { background: linear-gradient(135deg, var(--gov-purple) 0%, #4a1d6d 100%); color: white; padding: 25px 35px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gov-gold); }
    .section-banner { background: #f1f5f9; color: var(--gov-purple); padding: 12px 25px; font-weight: 900; border-right: 5px solid var(--gov-gold); margin: 25px 0 15px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 10px 30px; }
    .input-box { display: flex; flex-direction: column; gap: 8px; }
    .form-control-gov { padding: 14px; border-radius: 10px; border: 2px solid #cbd5e1; background: var(--input-bg); width: 100%; }
    .btn-gov { background: var(--gov-purple); color: white; border: 2px solid var(--gov-gold); padding: 15px 40px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }
    .manual-input { margin-top: 10px; border-color: var(--gov-gold); display: none; }
    .fin-card { background: #fff; border: 2.5px solid #e2e8f0; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; }
    .fin-card.active { border-color: var(--gov-purple); background: #f5f3ff; color: var(--gov-purple); }
</style>

<div class="form-container">
    <div class="form-header">
        <div>
            <h2 style="margin:0; font-weight: 900;">🛡️ نظام التعميد السيادي</h2>
            <small>أرشفة وتوثيق الموردين - محجوب أونلاين</small>
        </div>
        <div style="text-align:left; background: rgba(255,255,255,0.15); padding: 10px; border-radius: 12px;">
            <small>المعرف القادم</small><br>
            <strong style="font-size:1.2rem; color:var(--gov-gold);">SUP-MHA-{{ next_id }}</strong>
        </div>
    </div>

    <form id="sovereignForm" action="{{ url_for('admin.add_supplier') }}" method="POST">
        <div class="section-banner"><i class="fas fa-user-shield"></i> بيانات الهوية والنشاط</div>
        <div class="grid-layout">
            <div class="input-box">
                <label>اسم المستخدم</label>
                <input type="text" name="username" class="form-control-gov" required>
            </div>
            <div class="input-box">
                <label>كلمة المرور</label>
                <input type="text" name="password" value="123456" class="form-control-gov" required>
            </div>
        </div>

        <div class="section-banner"><i class="fas fa-list-check"></i> سجل الموردين المعتمدين</div>
        <div style="padding: 20px;">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead style="background: #f1f5f9;">
                        <tr>
                            <th>المعرف السيادي</th>
                            <th>الاسم التجاري</th>
                            <th>اسم المالك</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="suppliersTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div style="padding: 20px 30px;">
            <button type="submit" id="submitBtn" class="btn-gov">🛡️ إتمام التعميد والأرشفة</button>
        </div>
    </form>
</div>

<script>
    // جلب بيانات الجدول عند التحميل
    async function loadSuppliersTable() {
        try {
            const res = await fetch("{{ url_for('admin.get_suppliers_list') }}");
            const data = await res.json();
            const body = document.getElementById('suppliersTableBody');
            body.innerHTML = data.map(s => `
                <tr>
                    <td><code>${s.sovereign_id}</code></td>
                    <td>${s.trade_name}</td>
                    <td>${s.owner_name}</td>
                    <td><span class="badge bg-success">معمد</span></td>
                </tr>
            `).join('');
        } catch(e) { console.error("Error loading suppliers"); }
    }

    document.getElementById('sovereignForm').onsubmit = async (e) => {
        e.preventDefault();
        // إرسال البيانات ومعالجة الـ Response
        alert("جاري المعالجة...");
    };

    window.onload = loadSuppliersTable;
</script>
{% endblock %}
